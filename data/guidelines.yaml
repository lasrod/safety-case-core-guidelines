guidelines:

  # ===== CL. Claim rules =====

  - id: "CL.1"
    category: "CL"
    number: 1
    order: 10
    title: "Write each claim as a falsifiable proposition"
    guideline: |-
      State each claim as a sentence that can in principle be shown true or false.
    why: |-
      A safety case is built from claims that can be challenged, supported, or refuted. Statements that are merely labels, headings, slogans, or references are poor safety claims.
    review_prompts:
      - "Could a reviewer tell what would make this claim false?"
      - "Is this a proposition, or only a topic label?"
      - "Is the claim understandable without extra interpretation?"
    example:
      markdown: |-
        - Bad: Brake monitor safety
        - Better: Brake monitor response time meets the defined acceptance criterion.
      cases:
        - role: "bad"
          label: "Bad"
          text: "Brake monitor safety"
        - role: "better"
          label: "Better"
          text: "Brake monitor response time meets the defined acceptance criterion."
    references:
      - source_id: "ISO-IEC-IEEE-15026-2"
      - source_id: "OMG-SACM"
      - source_id: "CAE"
      - source_id: "UL4600"
        clauses: ["4.2.9", "5.2.3.1(a)"]
      - source_id: "GSN-v3"
        clauses: ["1:2.3.2"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "CAE Claim", "SACM Claim"]
      detection_hints:
        - "Look for goal text that is a noun phrase or topic label rather than a proposition."
        - "Look for goals lacking a verb expressing a property or a measurable condition."
      suggested_checks:
        - id: "check-claim-is-proposition"
          description: "Check whether the claim text is a complete proposition that can be true or false."
      suggested_ai_prompt: |-
        Review this claim. Is it a falsifiable proposition or only a topic label? Suggest a rewording that makes the claimed property explicit and testable.
    tags: ["claim", "falsifiability"]

  - id: "CL.2"
    category: "CL"
    number: 2
    order: 20
    title: "Put one main claim in one goal"
    guideline: |-
      Do not bundle multiple distinct properties, conclusions, or obligations into one goal.
    why: |-
      Bundled claims hide missing decomposition, make evidence assignment unclear, and produce review findings that are hard to localize.
    review_prompts:
      - "Does the statement contain more than one property?"
      - "Would different evidence sets be needed for different parts of the claim?"
      - "Could one part of the statement be acceptable while another could fail?"
    example:
      markdown: |-
        - Bad: `Planning software is safe and secure.`
        - Better: `Planning software safety is acceptable.`
          - And separately: `Planning software cybersecurity is acceptable.`
      cases:
        - role: "bad"
          label: "Bad"
          text: "Planning software is safe and secure."
        - role: "better"
          label: "Better"
          text: "Planning software safety is acceptable. And separately: Planning software cybersecurity is acceptable."
    references:
      - source_id: "ISO-IEC-IEEE-15026-2"
      - source_id: "OMG-SACM"
      - source_id: "CAE"
      - source_id: "UL4600"
        clauses: ["5.2.3"]
      - source_id: "GSN-v3"
        clauses: ["1:2.3.2"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "CAE Claim", "SACM Claim"]
      detection_hints:
        - "Look for conjunctions linking distinct properties (safe and secure, complete and correct)."
        - "Look for goals where different properties would be supported by different evidence sets."
      suggested_checks:
        - id: "check-single-property"
          description: "Check whether the claim asserts a single property or bundles several distinct properties."
      suggested_ai_prompt: |-
        Identify whether this claim bundles multiple distinct properties. If so, propose how to split it into separate sibling claims.
    tags: ["claim", "decomposition"]

  - id: "CL.3"
    category: "CL"
    number: 3
    order: 30
    title: "Avoid the essay-in-the-box"
    guideline: |-
      Do not pack argument structure, scope, decomposition topics, and caveats into a single claim. Keep the claim short, and express the rest through context, strategy, assumptions, and sub-claims.
    why: |-
      When a claim contains the whole story, reviewers cannot clearly see what is being claimed, what constrains the claim, and how the argument is intended to proceed. In GSN, that information should be visible in the structure, not hidden inside one sentence.
    review_prompts:
      - "Is the goal text trying to describe both the claim and its decomposition?"
      - "Is scope that should be in context embedded in the claim text?"
      - "Are included topics listed in the claim instead of being expressed as sub-claims?"
      - "Would the argument become clearer if the parent claim were shortened and the included topics moved into strategy and child claims?"
    example:
      markdown: |-
        - Bad: The product concept and system design, including faults, failures, interfaces, dependencies, degraded operation and transitions to safe states, are acceptably safe for operation within the defined ODD.
        - Better:
          - Goal: Design safety is acceptable.
          - Context: Applies within the defined ODD.
          - Strategy: Argument by decomposition over safety-relevant design topics.
          - Possible sub-claims:
            - Fault handling safety is acceptable.
            - Failure response safety is acceptable.
            - Safety-relevant interfaces are acceptable.
            - Safety-relevant dependencies are acceptable.
            - Degraded operation safety is acceptable.
            - Transitions to safe states are acceptable.
      cases:
        - role: "bad"
          label: "Bad"
          text: "The product concept and system design, including faults, failures, interfaces, dependencies, degraded operation and transitions to safe states, are acceptably safe for operation within the defined ODD."
        - role: "better"
          label: "Better"
          elements:
            claim: ["Design safety is acceptable."]
            context: ["Applies within the defined ODD."]
            strategy: ["Argument by decomposition over safety-relevant design topics."]
            possible_sub_claims:
              - "Fault handling safety is acceptable."
              - "Failure response safety is acceptable."
              - "Safety-relevant interfaces are acceptable."
              - "Safety-relevant dependencies are acceptable."
              - "Degraded operation safety is acceptable."
              - "Transitions to safe states are acceptable."
    note: |-
      Rewrite the parent as one short claim, move scope to context, move the reasoning to strategy, and express included topics as child claims.
    references:
      - source_id: "UL4600"
        clauses: ["5.2.3", "5.3.2.1(a)"]
      - source_id: "GSN-v3"
        clauses: ["1:2.3.3"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "CAE Claim", "SACM Claim"]
      detection_hints:
        - "Look for claims that contain long comma-separated lists of topics."
        - "Look for claim text that mixes scope, reasoning, caveats, and decomposition."
        - "Look for phrases such as including, covering, considering, or with respect to introducing multiple subtopics."
      suggested_checks:
        - id: "check-claim-length-and-role-mixing"
          description: "Check whether the claim contains argument structure or scope that should be represented through context, strategy, assumptions, or sub-claims."
        - id: "check-decomposition-hidden-in-claim"
          description: "Check whether the claim lists child topics instead of making the decomposition visible in the argument structure."
      suggested_ai_prompt: |-
        Review this safety case claim. Identify whether it is trying to carry the whole argument inside one claim. Suggest a shorter parent claim and propose which information should move to context, strategy, assumptions, or child claims.
    tags: ["claim", "scope", "decomposition", "GSN"]

  - id: "CL.4"
    category: "CL"
    number: 4
    order: 40
    title: "Avoid ambiguity and overloaded wording"
    guideline: |-
      Write claims so that their meaning is clear enough that competent reviewers are likely to understand them in the same way.
    why: |-
      Ambiguous claims undermine review, traceability, and evidence relevance. This guideline directly supports UL 4600’s requirement to avoid substantive ambiguity in claims and arguments.
    review_prompts:
      - "Could two competent reviewers understand the claim differently?"
      - "Is the object of the claim clear?"
      - "Is the property being claimed clear?"
    example:
      markdown: |-
        - Bad: Software requirements development is acceptably safe.
        - Better: The process used to develop software functional requirements is acceptably controlled.
      cases:
        - role: "bad"
          label: "Bad"
          text: "Software requirements development is acceptably safe."
        - role: "better"
          label: "Better"
          text: "The process used to develop software functional requirements is acceptably controlled."
    references:
      - source_id: "Greenwell-2006"
      - source_id: "NPSA-CAE"
      - source_id: "UL4600"
        clauses: ["5.2.3", "5.2.3.1(d)"]
      - source_id: "GSN-v3"
        clauses: ["2:5.4.1-2:5.4.3"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "CAE Claim", "SACM Claim"]
      detection_hints:
        - "Look for ambiguous subjects or properties (e.g. development is safe)."
        - "Look for claim text whose object or measured property is unclear."
      suggested_checks:
        - id: "check-claim-ambiguity"
          description: "Check whether competent reviewers would interpret the claim consistently."
      suggested_ai_prompt: |-
        Identify potential ambiguity in this claim. Propose wording that makes the object and property unambiguous.
    tags: ["claim", "ambiguity"]

  - id: "CL.5"
    category: "CL"
    number: 5
    order: 50
    title: "Bound vague and universal qualifiers"
    guideline: |-
      Do not leave broad evaluative terms or universal qualifiers unbounded. This includes terms such as safe, timely, effective, normal, robust, all, every, and never.
    why: |-
      Terms such as safe, timely, effective, normal, robust, all, every, and never can sound stronger or broader than the argument actually shows unless they are properly bounded.
    review_prompts:
      - "Is the term bounded by context, lower-level argument, or linked criteria?"
      - "If safe is used, is it clear what safety judgment is being claimed at this level?"
      - "Is the scope of all, every, or never explicitly defined?"
      - "Would the claim remain reviewable if read on its own?"
    example:
      markdown: |-
        - Example A Acceptable when bounded: The item is acceptably safe for operation within the defined ODD.
        - Example B Bad: The monitor provides timely mitigation. Better: Upon detection of condition C4, the monitor initiates minimum risk maneuver entry within the defined threshold.
      cases:
        - role: "good"
          label: "Example A (acceptable when bounded)"
          text: "The item is acceptably safe for operation within the defined ODD."
        - role: "bad"
          label: "Example B Bad"
          text: "The monitor provides timely mitigation."
        - role: "better"
          label: "Example B Better"
          text: "Upon detection of condition C4, the monitor initiates minimum risk maneuver entry within the defined threshold."
    references:
      - source_id: "Greenwell-2006"
      - source_id: "NPSA-CAE"
      - source_id: "UL4600"
        clauses: ["5.2.3", "5.2.3.1(d)"]
      - source_id: "GSN-v3"
        clauses: ["2:5.5.1-2:5.6.1"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "CAE Claim"]
      detection_hints:
        - "Look for unbounded evaluative terms: safe, robust, effective, timely, normal."
        - "Look for universal qualifiers without scope: all, every, never, always."
      suggested_checks:
        - id: "check-bounded-qualifiers"
          description: "Check whether evaluative or universal qualifiers in the claim are bounded by context or measurable criteria."
      suggested_ai_prompt: |-
        Identify unbounded evaluative or universal qualifiers in this claim. Suggest scope or criteria that would bound them.
    tags: ["claim", "qualifiers", "vagueness"]

  - id: "CL.6"
    category: "CL"
    number: 6
    order: 60
    title: "Do not mix different logical steps in one claim"
    guideline: |-
      Do not combine identification, adequacy, implementation, validation, and sufficiency in one claim unless the claim is intentionally kept at a higher level and the need for later decomposition is explicit
    why: |-
      These are different claim types with different evidence and different review questions.
    review_prompts:
      - "Is this claim actually several claims chained together?"
      - "Would different teams or documents support different parts?"
      - "Should the branch be decomposed before evidence is attached?"
    example:
      markdown: |-
        - Bad: All identified hazards have been mitigated and validated.
          - Better parent: Hazards are acceptably addressed.
          - Possible sub-claims:
            - Hazards are identified.
            - Defined mitigations are implemented.
            - Validation evidence is sufficient.
      cases:
        - role: "bad"
          label: "Bad"
          text: "All identified hazards have been mitigated and validated."
        - role: "better"
          label: "Better"
          elements:
            parent: ["Hazards are acceptably addressed."]
            possible_sub_claims:
              - "Hazards are identified."
              - "Defined mitigations are implemented."
              - "Validation evidence is sufficient."
    references:
      - source_id: "ISO-IEC-IEEE-15026-2"
      - source_id: "OMG-SACM"
      - source_id: "CAE"
      - source_id: "UL4600"
        clauses: ["5.2.3", "5.3.1", "5.3.2"]
      - source_id: "GSN-v3"
        clauses: ["1:2.3.2-1:2.3.3"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "CAE Claim"]
      detection_hints:
        - "Look for claims that chain identification + implementation + validation in one sentence."
      suggested_checks:
        - id: "check-claim-step-mixing"
          description: "Check whether the claim mixes identification, adequacy, implementation, validation, and sufficiency steps."
      suggested_ai_prompt: |-
        Identify whether this claim chains multiple logical steps. Propose a parent claim and the sub-claims it should be decomposed into.
    tags: ["claim", "decomposition"]

  # ===== AR. Argument structure and decomposition rules =====

  - id: "AR.1"
    category: "AR"
    number: 1
    order: 10
    title: "Let structure carry the argument"
    guideline: |-
      Use the assurance case structure to make each element's role clear. Claims state propositions to be established; argument elements explain the reasoning, decomposition approach, or inference rule; context and assumptions define scope and dependencies when needed; and evidence elements identify the artefacts or observations used as support.
    why: |-
      When one GSN element is used to do another element’s job, the argument becomes harder to inspect, review, and challenge.
    review_prompts:
      - "Is a claim carrying reasoning that belongs in an argument, strategy, or warrant?"
      - "Is local scope or meaning hidden inside the claim instead of being made explicit?"
      - "Is a dependency or rationale hidden in claim or argument text?"
      - "Is an evidence reference being used as if it were a claim?"
      - "Is a justification being used as if it were support?"
    example:
      markdown: |-
        - Better notation-neutral pattern:
          - Goal: Functional design safety is acceptable.
          - Strategy: Argument by autonomy hazard topic.
          - Context: Functional design refers to the ISO 26262 functional design scope for the item.
          - Justification: This claim is included because the project requires ISO 26262 compliance.
          - Possible sub-claims:
            - Functional safety requirements are defined.
            - Required safety mechanisms are defined.
            - Safety-relevant interfaces are defined.
      cases:
        - role: "better"
          label: "Better pattern"
          elements:
            claim: ["Functional design safety is acceptable."]
            strategy: ["Argument by autonomy hazard topic."]
            context: ["Functional design refers to the ISO 26262 functional design scope for the item."]
            justification: ["This claim is included because the project requires ISO 26262 compliance."]
            possible_sub_claims:
              - "Functional safety requirements are defined."
              - "Required safety mechanisms are defined."
              - "Safety-relevant interfaces are defined."
    references:
      - source_id: "OMG-SACM"
      - source_id: "ONR"
      - source_id: "EASA"
      - source_id: "NPSA-CAE"
      - source_id: "UL4600"
        clauses: ["5.2.3", "5.3.2.1(a)"]
      - source_id: "GSN-v3"
        clauses: ["1:2.2.10-1:2.2.19", "1:2.3.2-1:2.3.6"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Strategy", "GSN Context", "GSN Assumption", "GSN Justification", "GSN Solution"]
      detection_hints:
        - "Look for goals containing reasoning verbs (we argue that, by decomposing)."
        - "Look for solutions phrased as claims rather than evidence references."
        - "Look for assumptions or justifications buried in claim or strategy text."
      suggested_checks:
        - id: "check-element-role-misuse"
          description: "Check whether each element is used for its intended GSN role."
      suggested_ai_prompt: |-
        Review the GSN element roles in this branch. Identify any element that is doing another element's job and propose a corrected structure.
    tags: ["structure", "role-clarity", "notation-neutral", "GSN", "CAE"]
    note: |-
      Notation note: In GSN, the generic roles map to goals, strategies, context, assumptions, justifications, and solutions. In CAE, the same concern maps to claims, arguments or warrants, evidence, and explicit context or assumption information. Apply this guideline to role clarity rather than to a mandatory GSN element set.

  - id: "AR.2"
    category: "AR"
    number: 2
    order: 20
    title: "State the inference step explicitly"
    guideline: |-
      State how the parent claim is being decomposed or argued; do not make the reviewer infer the decomposition rule from wording alone.
    why: |-
      A hidden reasoning step is a common source of argument gaps.
    review_prompts:
      - "Is the decomposition rule visible?"
      - "Would another reviewer derive the same child-claim set?"
      - "Does the strategy explain why these children support this parent?"
    example:
      markdown: |-
        - Bad: Perception, planning, control, timing, and interfaces are adequately addressed.
          - Better goal: Autonomy function safety is acceptable.
          - Better strategy: Argument by decomposition over autonomy function topics identified by UL 4600.
          - Justification (if needed): This decomposition follows the autonomy-related topics that UL 4600 requires the safety case to address.
          - Possible sub-claims:
            - ODD-related safety is acceptable.
            - Sensing safety is acceptable.
            - Perception safety is acceptable.
            - Machine learning and AI technique safety is acceptable.
            - Planning safety is acceptable.
            - Prediction safety is acceptable.
            - Trajectory and control safety is acceptable.
            - Actuation safety is acceptable.
            - Timing safety is acceptable.
      cases:
        - role: "bad"
          label: "Bad"
          text: "Perception, planning, control, timing, and interfaces are adequately addressed."
        - role: "better"
          label: "Better"
          elements:
            claim: ["Autonomy function safety is acceptable."]
            strategy: ["Argument by decomposition over autonomy function topics identified by UL 4600."]
            justification: ["This decomposition follows the autonomy-related topics that UL 4600 requires the safety case to address."]
            possible_sub_claims:
              - "ODD-related safety is acceptable."
              - "Sensing safety is acceptable."
              - "Perception safety is acceptable."
              - "Machine learning and AI technique safety is acceptable."
              - "Planning safety is acceptable."
              - "Prediction safety is acceptable."
              - "Trajectory and control safety is acceptable."
              - "Actuation safety is acceptable."
              - "Timing safety is acceptable."
    references:
      - source_id: "OMG-SACM"
      - source_id: "ONR"
      - source_id: "EASA"
      - source_id: "NPSA-CAE"
      - source_id: "UL4600"
        clauses: ["5.3.2.1(a)", "5.3.2.1(a)(1)"]
      - source_id: "GSN-v3"
        clauses: ["1:2.3.3"]
      - source_id: "CAE"
    tool_guidance:
      applicable_elements: ["GSN Strategy", "CAE Argument"]
      detection_hints:
        - "Look for branches with sub-claims but no strategy element explaining the decomposition rule."
        - "Look for parent claims whose decomposition rule is implicit in the wording."
      suggested_checks:
        - id: "check-explicit-strategy"
          description: "Check whether each decomposition has an explicit strategy stating how children support the parent."
      suggested_ai_prompt: |-
        Identify the implicit decomposition rule in this branch. Propose an explicit strategy element and confirm whether the sub-claims align with it.
    tags: ["structure", "strategy"]

  - id: "AR.3"
    category: "AR"
    number: 3
    order: 30
    title: "Use context and assumptions deliberately"
    guideline: |-
      Make scope, definitions, operating conditions, and dependencies explicit. Use separate context and assumption structures when supported by the notation or tool; where they must appear in claim text, write them deliberately and consistently rather than hiding them in ambiguous qualifiers.
    why: |-
      This keeps the claim interpretable and makes clear which information defines the claim's scope and meaning, and which conditions the argument depends on being true.
    review_prompts:
      - "Is this text making the claim itself, defining the claim's scope, or stating a dependency that must hold?"
      - "Is any condition required for the claim to hold hidden in wording rather than made explicit?"
      - "Would the argument be clearer if scope, definitions, or dependencies were represented separately?"
      - "If context is included in claim text, is it deliberate, consistent, and necessary for the claim to be true or false?"
    example:
      markdown: |-
        - Bad: The braking controller is acceptably safe in Highway ODD during automated mode with valid localization and nominal interface timing.
          - Better claim: Braking controller safety is acceptable.
          - Better context: Applies in Highway ODD. / Applies in automated mode.
          - Better assumptions: Valid localization available. / nominal interface timing conditions apply.
      cases:
        - role: "bad"
          label: "Bad"
          text: "The braking controller is acceptably safe in Highway ODD during automated mode with valid localization and nominal interface timing."
        - role: "better"
          label: "Better"
          elements:
            claim: ["Braking controller safety is acceptable."]
            context:
              - "Applies in Highway ODD."
              - "Applies in automated mode."
            assumptions:
              - "Valid localization available."
              - "nominal interface timing conditions apply."
    references:
      - source_id: "OMG-SACM"
      - source_id: "ONR"
      - source_id: "EASA"
      - source_id: "NPSA-CAE"
      - source_id: "UL4600"
        clauses: ["5.2.3", "5.4.1.3(a)(11)"]
      - source_id: "GSN-v3"
        clauses: ["1:2.2.10-1:2.2.18"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Context", "GSN Assumption", "CAE Claim", "CAE Context"]
      detection_hints:
        - "Look for claim text containing scope phrases (in ODD X, during mode Y) or dependency phrases (with valid Z)."
      suggested_checks:
        - id: "check-context-assumption-placement"
          description: "Check whether scope and dependencies in claim text should be moved to context or assumption elements."
      suggested_ai_prompt: |-
        Identify scope and dependency phrases in this claim. Propose which should become context elements and which should become assumption elements.
    tags: ["structure", "context", "assumption", "scope", "notation-neutral"]
    note: |-
      Notation note: GSN provides context and assumption elements for this purpose. CAE may represent context as claim scope, attached information, or supporting explanatory text depending on the notation/tool. The SCCG requirement is explicitness and reviewability, not a mandatory representation form.

  - id: "AR.4"
    category: "AR"
    number: 4
    order: 40
    title: "Match claim precision to the level of the argument"
    guideline: |-
      Keep upper-level claims short and stable; make evidence-facing claims precise enough to assess.
    why: |-
      Top-level claims need readability and stability. Lower-level claims need assessability.
    review_prompts:
      - "Is a high-level claim overloaded with low-level detail?"
      - "Is a leaf claim too vague to assess against evidence?"
      - "Could the claim stay short because linked criteria already make it objective?"
    example:
      markdown: |-
        - Examples of increasing precision at different levels of the argument, not necessarily adjacent nodes:
          - Upper level: Functional design safety is acceptable.
          - Lower level: Sensing-related hazards are identified.
          - Evidence-facing level: Detection timing meets the defined acceptance criterion.
      cases:
        - role: "informative"
          label: "Increasing precision across levels"
          elements:
            upper: ["Functional design safety is acceptable."]
            lower: ["Sensing-related hazards are identified."]
            evidence_facing: ["Detection timing meets the defined acceptance criterion."]
    references:
      - source_id: "UL4600"
        clauses: ["5.2.3", "5.4.2.1(b)"]
      - source_id: "GSN-v3"
        clauses: ["Part 2 §2:2"]
    tool_guidance:
      applicable_elements: ["GSN Goal"]
      detection_hints:
        - "Look for top-level claims overloaded with measurement detail."
        - "Look for leaf claims too vague to compare with evidence."
      suggested_checks:
        - id: "check-precision-by-level"
          description: "Check whether claim precision matches argument level."
      suggested_ai_prompt: |-
        Assess whether this claim's precision matches its position in the argument. Suggest a wording adjustment if it is too high or too low.
    tags: ["structure", "precision"]

  - id: "AR.5"
    category: "AR"
    number: 5
    order: 50
    title: "Keep scope and terminology consistent across decomposition"
    guideline: |-
      Do not silently redefine the object, scope, or meaning of key terms as the argument decomposes.
    why: |-
      Silent redefinition can leave higher-level claims only partially supported while appearing complete.
    review_prompts:
      - "Does a key term mean the same thing at parent and sub-claim levels?"
      - "Has scope narrowed without being stated?"
      - "Is inherited context still valid at this level?"
    example:
      markdown: |-
        - Bad pattern:
          - Parent claim: Software safety is acceptable.
          - Strategy: Argument by software component type.
          - Child claims:
            - Application software safety is acceptable.
            - Middleware software safety is acceptable.
        - Problem: the parent claim refers to all software, but the child claims silently narrow the scope to only part of the software. The branch appears complete while leaving other software out of scope without saying so.
      cases:
        - role: "bad"
          label: "Bad pattern"
          elements:
            parent: ["Software safety is acceptable."]
            strategy: ["Argument by software component type."]
            children:
              - "Application software safety is acceptable."
              - "Middleware software safety is acceptable."
        - role: "problem"
          label: "Problem"
          text: "The parent claim refers to all software, but the child claims silently narrow the scope to only part of the software. The branch appears complete while leaving other software out of scope without saying so."
    references:
      - source_id: "UL4600"
        clauses: ["5.2.3"]
      - source_id: "GSN-v3"
        clauses: ["1:2.2.11", "2:5.5.3"]
    tool_guidance:
      applicable_elements: ["GSN Goal"]
      detection_hints:
        - "Look for parent/child pairs where a key noun's scope changes silently."
      suggested_checks:
        - id: "check-scope-consistency"
          description: "Check whether key terms preserve scope across decomposition."
      suggested_ai_prompt: |-
        Compare the scope of key terms in the parent and child claims. Identify any silent narrowing or redefinition.
    tags: ["structure", "scope"]

  - id: "AR.6"
    category: "AR"
    number: 6
    order: 60
    title: "Provide the context needed to interpret the claim"
    guideline: |-
      Provide the context needed for the reviewer to understand the claim’s subject, intended meaning, scope, operating conditions, and key definitions.
    why: |-
      This guideline is about whether the branch contains enough context at all. In GSN, claims are asserted in a specified context. A claim that lacks essential context can look stronger than intended or become hard to review consistently because different readers may supply different meanings or boundaries.
    review_prompts:
      - "What must the reviewer know for this claim to be true or false?"
      - "Are key terms defined where needed?"
      - "Is any necessary scope or operating condition explicit?"
      - "Would two independent reviewers understand the claim in the same way?"
    example:
      markdown: |-
        - Bad: Perception performance is acceptable.
        - Problem: Perception performance is not defined, so different reviewers may understand different outputs, measures, or success conditions.
          - Better goal: Perception performance is acceptable.
          - Better context: Perception performance refers to object detection, classification, and tracking performance as defined in Specification PER-01.
      cases:
        - role: "bad"
          label: "Bad"
          text: "Perception performance is acceptable."
        - role: "problem"
          label: "Problem"
          text: "Perception performance is not defined, so different reviewers may understand different outputs, measures, or success conditions."
        - role: "better"
          label: "Better"
          elements:
            claim: ["Perception performance is acceptable."]
            context: ["Perception performance refers to object detection, classification, and tracking performance as defined in Specification PER-01."]
    references:
      - source_id: "OMG-SACM"
      - source_id: "ONR"
      - source_id: "EASA"
      - source_id: "NPSA-CAE"
      - source_id: "UL4600"
        clauses: ["5.2.3"]
      - source_id: "GSN-v3"
        clauses: ["1:2.2.10-1:2.2.11", "1:2.3.5"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Context"]
      detection_hints:
        - "Look for claims using domain terms that are not defined in any linked context."
      suggested_checks:
        - id: "check-context-presence"
          description: "Check whether the claim has enough linked context for consistent interpretation."
      suggested_ai_prompt: |-
        Identify what additional context would be needed for two independent reviewers to interpret this claim the same way.
    tags: ["structure", "context"]

  - id: "AR.7"
    category: "AR"
    number: 7
    order: 70
    title: "Make claim qualifiers explicit and maintainable"
    guideline: |-
      Do not hide qualifiers, definitions, interface conditions, or dependency clauses in claim text in a way that obscures scope or support. Use separate context or assumption structures where available; otherwise make the qualifiers deliberate, clear, and consistently phrased.
    why: |-
      This guideline is about placement, clarity, and maintainability. Hidden qualifiers blur element roles, make scope and dependency changes harder to see, and often create claims that are difficult to review and maintain.
    review_prompts:
      - "Which words in this claim are qualifiers rather than the core assertion?"
      - "Are the qualifiers clear enough for review, or would they be better represented as context or assumptions?"
      - "Could the core claim remain stable if a configuration, interface condition, or dependency changed?"
      - "Are dependencies explicit and traceable rather than hidden inside readable but overloaded claim text?"
    example:
      markdown: |-
        - Bad: Planner safety is acceptable with valid localization and nominal interface timing.
          - Better goal: Planner safety is acceptable.
          - Better context: Planner refers to the motion planning function defined in architecture element PLN-01.
          - Better assumptions: Valid localization is available. / Nominal interface timing conditions apply.
      cases:
        - role: "bad"
          label: "Bad"
          text: "Planner safety is acceptable with valid localization and nominal interface timing."
        - role: "better"
          label: "Better"
          elements:
            claim: ["Planner safety is acceptable."]
            context: ["Planner refers to the motion planning function defined in architecture element PLN-01."]
            assumptions:
              - "Valid localization is available."
              - "Nominal interface timing conditions apply."
    references:
      - source_id: "OMG-SACM"
      - source_id: "ONR"
      - source_id: "EASA"
      - source_id: "NPSA-CAE"
      - source_id: "UL4600"
        clauses: ["5.2.3", "5.3.2.1(a)"]
      - source_id: "GSN-v3"
        clauses: ["1:2.2.10-1:2.2.13"]
      - source_id: "CAE"
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Context", "GSN Assumption", "CAE Claim"]
      detection_hints:
        - "Look for connectives in claim text such as with, given, assuming, provided that, when."
      suggested_checks:
        - id: "check-claim-text-purity"
          description: "Check whether qualifying clauses in claim text should move to context or assumption elements."
      suggested_ai_prompt: |-
        Identify qualifier clauses inside this claim text. Propose which should become context elements and which should become assumption elements.
    tags: ["structure", "context", "assumption", "qualifiers", "notation-neutral"]
    note: |-
      Notation note: This guideline is stricter for GSN, where context and assumptions should usually be represented by their own elements. In CAE, claim text may legitimately include scope when needed to make the claim true or false. The SCCG requirement is that qualifiers be clear, consistent, and reviewable.

  - id: "AR.8"
    category: "AR"
    number: 8
    order: 80
    title: "Do not use rationale as hidden support"
    guideline: |-
      Use rationale, warrant, or justification text to explain why a wording, boundary, decomposition, or inference choice is acceptable; do not use it as the proof that a claim is true.
    why: |-
      Rationale can explain local reasoning choices, but it cannot replace sub-claims, evidence, or a clear argument linking evidence to the claim. Treating rationale as support hides missing reasoning, missing evidence, or unsupported assumptions.
    review_prompts:
      - "Is the rationale explaining a local choice, or trying to carry evidential weight?"
      - "If the rationale were removed, would the real support for the claim still remain?"
    example:
      markdown: |-
        - Bad: Goal Brake hazards are adequately addressed. with justification Because tests were passed.
        - Better: Use evidence and sub-claims for test support. Reserve justification for local rationale such as why a hazard grouping or decomposition choice is acceptable.
      cases:
        - role: "bad"
          label: "Bad"
          text: "Goal Brake hazards are adequately addressed. with justification Because tests were passed."
        - role: "better"
          label: "Better"
          text: "Use evidence and sub-claims for test support. Reserve justification for local rationale such as why a hazard grouping or decomposition choice is acceptable."
    references:
      - source_id: "OMG-SACM"
      - source_id: "ONR"
      - source_id: "EASA"
      - source_id: "NPSA-CAE"
      - source_id: "UL4600"
        clauses: ["5.2.3", "5.3.2.1(a)"]
      - source_id: "GSN-v3"
        clauses: ["1:2.2.14", "1:2.3.6"]
    tool_guidance:
      applicable_elements: ["GSN Justification"]
      detection_hints:
        - "Look for justifications that cite test results or evidence rather than rationale."
      suggested_checks:
        - id: "check-justification-misuse"
          description: "Check whether the justification carries evidential weight that should sit in evidence or sub-claims."
      suggested_ai_prompt: |-
        Determine whether this justification provides local rationale or hidden support. If hidden support, propose where the material should move (strategy, sub-claim, or evidence).
    tags: ["structure", "rationale", "justification", "warrant", "support", "GSN", "CAE"]
    note: |-
      Notation note: In GSN, this applies directly to justification elements. In CAE, this applies to warrants, side-warrants, side-claims, and explanatory notes: they may explain an inference, but they should not replace the evidence or sub-claims needed to support the claim.

  - id: "AR.9"
    category: "AR"
    number: 9
    order: 90
    title: "Match each rationale to the element or inference it explains"
    guideline: |-
      Any rationale, warrant, or justification shall address the exact claim, argument, or inference step to which it is attached and shall not explain a different issue elsewhere in the branch.
    why: |-
      Misaligned rationale creates false confidence and often reveals that the real concern is missing context, missing decomposition, missing evidence, or an unstated inference rule.
    review_prompts:
      - "Does the rationale explain why this exact claim formulation, decomposition, or inference is acceptable?"
      - "Is it local, or is it trying to justify the whole branch?"
      - "Could the same text be pasted onto many different elements without change?"
    example:
      markdown: |-
        - Bad: Goal Sensor faults are adequately addressed. with justification The item is intended for highway use.
        - Better: Put highway use in context and use any justification to explain a local choice such as why a particular fault grouping is appropriate.
      cases:
        - role: "bad"
          label: "Bad"
          text: "Goal Sensor faults are adequately addressed. with justification The item is intended for highway use."
        - role: "better"
          label: "Better"
          text: "Put highway use in context and use any justification to explain a local choice such as why a particular fault grouping is appropriate."
    references:
      - source_id: "OMG-SACM"
      - source_id: "ONR"
      - source_id: "EASA"
      - source_id: "NPSA-CAE"
      - source_id: "UL4600"
        clauses: ["5.2.3"]
      - source_id: "GSN-v3"
        clauses: ["1:2.2.14-1:2.2.19"]
    tool_guidance:
      applicable_elements: ["GSN Justification", "CAE Warrant", "CAE Side-warrant", "CAE Side-claim"]
      detection_hints:
        - "Look for justifications that could be moved to other elements without losing meaning."
      suggested_checks:
        - id: "check-justification-locality"
          description: "Check whether the justification is local to its attached element."
      suggested_ai_prompt: |-
        Check whether this justification is specifically about the attached element. If not, propose where it should be relocated and what local rationale should replace it.
    tags: ["structure", "rationale", "justification", "warrant", "locality", "GSN", "CAE"]
    note: |-
      Notation note: In GSN, this applies directly to justification elements. In CAE, this applies to warrants, side-warrants, side-claims, and explanatory notes used to qualify or explain an inference. The rationale must match the exact element or inference it is attached to.

  # ===== EV. Evidence rules =====

  - id: "EV.1"
    category: "EV"
    number: 1
    order: 10
    title: "Make the evidence-support path explicit for every claim"
    guideline: |-
      Show, for each claim, the evidence path that supports it, either directly or through stated sub-claims and intermediate arguments.
    why: |-
      A safety case without traceability cannot be effectively reviewed or maintained.
    review_prompts:
      - "Can the reviewer identify the intended evidence path without having to infer it?"
      - "Is it clear which evidence path ultimately supports this claim?"
      - "Would two reviewers follow the same trace to the same evidence?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Detection timing is acceptable.
          - Linked solution: System validation report.
        - Problem: the reviewer cannot tell which test, section, or lower-level argument is intended to show that detection timing is acceptable. The trace exists only in the author’s head.
      cases:
        - role: "bad"
          label: "Bad pattern"
          elements:
            claim: ["Detection timing is acceptable."]
            linked_solution: ["System validation report."]
        - role: "problem"
          label: "Problem"
          text: "The reviewer cannot tell which test, section, or lower-level argument is intended to show that detection timing is acceptable. The trace exists only in the author’s head."
    references:
      - source_id: "ONR"
      - source_id: "UNECE-ADS"
      - source_id: "UL4600"
        clauses: ["5.4.1.1(a)", "5.4.1.6.1"]
      - source_id: "GSN-v3"
        clauses: ["2:3.7.3"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Solution", "CAE Evidence"]
      detection_hints:
        - "Look for claims with no traceable path to evidence."
        - "Look for solutions linked to claims without intermediate sub-claims when needed."
      suggested_checks:
        - id: "check-evidence-trace"
          description: "Check whether each claim has an explicit evidence path through sub-claims or direct solutions."
      suggested_ai_prompt: |-
        Trace this claim to its supporting evidence. Identify any missing intermediate sub-claims required for the path to be explicit.
    tags: ["evidence", "traceability"]

  - id: "EV.2"
    category: "EV"
    number: 2
    order: 20
    title: "Use evidence types that can be independently reviewed"
    guideline: |-
      Do not use evidence unless its artifact type is defined for safety case use and the artifact meets the criteria required for that type, so that it can be reviewed and assessed consistently.
    why: |-
      A reviewer should be able to recognize what kind of evidence is being used, what makes it acceptable for this purpose, and how it should be interpreted. If an artifact is not an approved evidence type, or does not meet the criteria required for that type, it becomes difficult to review consistently and easy to misuse in a safety argument.
    review_prompts:
      - "Is the evidence type clearly defined?"
      - "Is the expected structure or content of the artifact defined?"
      - "Is it clear how the artifact is to be interpreted?"
      - "Is there a defined basis for reviewing, validating, or accepting this evidence type?"
      - "Could an independent reviewer examine the artifact consistently without relying on undocumented local knowledge?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Perception validation evidence is sufficient for this claim.
          - Evidence: Engineer working file WF-27.
        - Problem:
          - The artifact is being used as safety case evidence, but it is not an approved evidence type for this purpose, or it is not shown to meet the criteria required for that evidence type. The reviewer therefore cannot assess it consistently as acceptable evidence.
        - Better notation-neutral pattern:
          - Claim: Perception validation evidence is sufficient for this claim.
          - Evidence: Perception validation report PVR-08, rev B.
          - Context: Validation report is an approved evidence type for this kind of claim.
          - Evidence basis: The cited artifact meets the defined criteria for that evidence type.
      cases:
        - role: "bad"
          label: "Bad pattern"
          elements:
            claim: ["Perception validation evidence is sufficient for this claim."]
            evidence: ["Engineer working file WF-27."]
        - role: "problem"
          label: "Problem"
          text: "The artifact is being used as safety case evidence, but it is not an approved evidence type for this purpose, or it is not shown to meet the criteria required for that evidence type. The reviewer therefore cannot assess it consistently as acceptable evidence."
        - role: "better"
          label: "Better pattern"
          elements:
            claim: ["Perception validation evidence is sufficient for this claim."]
            evidence: ["Perception validation report PVR-08, rev B."]
            context: ["Validation report is an approved evidence type for this kind of claim."]
            evidence_basis: ["The cited artifact meets the defined criteria for that evidence type."]
    references:
      - source_id: "Weaver"
      - source_id: "Hawkins"
      - source_id: "CAE-Concepts"
      - source_id: "UL4600"
        clauses: ["5.2.2", "5.2.2.1(a)-(b)"]
    tool_guidance:
      applicable_elements: ["GSN Solution", "CAE Evidence"]
      detection_hints:
        - "Look for evidence references to ad-hoc or working artifacts (working file, draft notes)."
      suggested_checks:
        - id: "check-evidence-type-defined"
          description: "Check whether the evidence type is defined and the artifact meets the type's criteria."
      suggested_ai_prompt: |-
        Identify whether the cited evidence is an approved evidence type for this claim. Suggest what would need to be documented to make it independently reviewable.
    tags: ["evidence", "type"]

  - id: "EV.3"
    category: "EV"
    number: 3
    order: 30
    title: "Claim the fact supported by the evidence, not the document"
    guideline: |-
      Write the claim as the fact or property being supported; do not make the goal say that a report, analysis, or test proves the safety conclusion.
    why: |-
      Evidence usually supports a specific fact or bounded property, not the whole safety conclusion by itself.
    review_prompts:
      - "Is the goal naming a document instead of a supported property?"
      - "Is the evidential link too large for the cited artifact?"
      - "Would the claim remain meaningful if the artifact name changed?"
    example:
      markdown: |-
        - Bad: TR-21 proves the braking controller is safe.
        - Better: Braking controller stopping distance meets acceptance criterion AC-BRK-04.
      cases:
        - role: "bad"
          label: "Bad"
          text: "TR-21 proves the braking controller is safe."
        - role: "better"
          label: "Better"
          text: "Braking controller stopping distance meets acceptance criterion AC-BRK-04."
    references:
      - source_id: "UL4600"
        clauses: ["5.4.2.1(c)(1)"]
      - source_id: "GSN-v3"
        clauses: ["1:2.3.4", "2:3.7.3"]
    tool_guidance:
      applicable_elements: ["GSN Goal"]
      detection_hints:
        - "Look for claim text that names a report, document, or analysis as the subject."
      suggested_checks:
        - id: "check-claim-subject-not-document"
          description: "Check whether the claim subject is a property rather than a document."
      suggested_ai_prompt: |-
        Identify whether this claim makes a document the subject. Propose a rewording where the supported fact or property is the subject.
    tags: ["evidence", "claim"]

  - id: "EV.4"
    category: "EV"
    number: 4
    order: 40
    title: "Cite precise evidence locations; avoid annex dumping"
    guideline: |-
      Reference the exact section, figure, table, dataset, or artifact portion that supports the claim when practical.
    why: |-
      Broad references to whole reports create the illusion of support without making the evidential link easy to review.
    review_prompts:
      - "Could a reviewer find the relevant support quickly?"
      - "Is the cited location precise enough?"
      - "Is the reference proportionate to the actual support being used?"
    example:
      markdown: |-
        - Bad: See validation report.
        - Better: See validation report VR-04, section 6.3, table 12, scenarios S14-S21.
      cases:
        - role: "bad"
          label: "Bad"
          text: "See validation report."
        - role: "better"
          label: "Better"
          text: "See validation report VR-04, section 6.3, table 12, scenarios S14-S21."
    references:
      - source_id: "ONR"
      - source_id: "UNECE-ADS"
      - source_id: "UL4600"
        clauses: ["5.4.1.1(a)", "5.4.2.1(c)(1)"]
      - source_id: "GSN-v3"
        clauses: ["2:3.7.4"]
    tool_guidance:
      applicable_elements: ["GSN Solution", "CAE Evidence"]
      detection_hints:
        - "Look for evidence references that name an entire report without section/table/figure."
      suggested_checks:
        - id: "check-evidence-citation-precision"
          description: "Check whether evidence references are specific enough to be quickly verified."
      suggested_ai_prompt: |-
        Assess whether this evidence citation is precise enough. Propose the section, table, figure, or dataset reference that should be added.
    tags: ["evidence", "citation"]

  - id: "EV.5"
    category: "EV"
    number: 5
    order: 50
    title: "Make the basis for evidence sufficiency explicit"
    guideline: |-
      When a claim is supported by evidence, make clear what makes that evidence sufficient for that claim.
    why: |-
      A reviewer should not have to guess why a cited test, analysis, dataset, or review record is enough. The argument should make the sufficiency basis visible, such as relevant scope, configuration, scenario coverage, thresholds, acceptance conditions, and known limitations.
    review_prompts:
      - "What makes this evidence enough for this claim?"
      - "Is the required scope, configuration, scenario set, or operating condition clear?"
      - "Is any threshold, pass criterion, or completeness expectation stated?"
      - "Are known limitations or uncovered conditions explicit?"
      - "Is the branch showing only that the evidence is relevant, or also that it is enough?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Perception performance is acceptable.
          - Evidence: Perception validation report PVR-08.
        - Problem: The report is cited, but the argument does not state what coverage, thresholds, configurations, or limitations make that report sufficient for this claim.
        - Better notation-neutral pattern:
          - Claim: Perception performance is acceptable for ODD-A daytime operation.
          - Evidence: Perception validation report PVR-08.
          - Context: Applies to software build SB-14 and sensor configuration C3.
          - Justification: Sufficiency is based on scenario coverage SC-21, acceptance thresholds AC-PER-04 to AC-PER-07, and the stated exclusion of dense fog conditions.
      cases:
        - role: "bad"
          label: "Bad pattern"
          elements:
            claim: ["Perception performance is acceptable."]
            evidence: ["Perception validation report PVR-08."]
        - role: "problem"
          label: "Problem"
          text: "The report is cited, but the argument does not state what coverage, thresholds, configurations, or limitations make that report sufficient for this claim."
        - role: "better"
          label: "Better pattern"
          elements:
            claim: ["Perception performance is acceptable for ODD-A daytime operation."]
            evidence: ["Perception validation report PVR-08."]
            context: ["Applies to software build SB-14 and sensor configuration C3."]
            justification: ["Sufficiency is based on scenario coverage SC-21, acceptance thresholds AC-PER-04 to AC-PER-07, and the stated exclusion of dense fog conditions."]
    references:
      - source_id: "Weaver"
      - source_id: "Hawkins"
      - source_id: "CAE-Concepts"
      - source_id: "UL4600"
        clauses: ["5.4.2.1(b)-(c)", "5.3.2.1(a)(1)"]
    tool_guidance:
      applicable_elements: ["GSN Solution", "GSN Justification"]
      detection_hints:
        - "Look for evidence cited without scope, threshold, or coverage justification."
      suggested_checks:
        - id: "check-evidence-sufficiency-basis"
          description: "Check whether the basis for evidence sufficiency is explicit."
      suggested_ai_prompt: |-
        Identify what coverage, thresholds, configurations, or limitations make the cited evidence sufficient. Propose explicit justification text.
    tags: ["evidence", "sufficiency"]

  - id: "EV.6"
    category: "EV"
    number: 6
    order: 60
    title: "Explain how the evidence supports or refutes the claim"
    guideline: |-
      Ensure the inferential link between claim and evidence is explicitly documented and reviewable. The documentation shall explain how the cited evidence supports the claim, and where relevant how it reveals limitations or possible refutation.
    why: |-
      Evidence does not speak for itself. The safety case or linked assessment record must explain why the evidence bears on the claim.
    review_prompts:
      - "Is it explicit why this evidence matters for this claim?"
      - "Is the inferential link documented in a reviewable form?"
      - "Does the documentation explain only support, or also limitations and possible refutation?"
      - "Has confirmation bias been considered?"
    example:
      markdown: |-
        - Bad pattern:
          - GSN claim: Detection timing meets acceptance criterion AC-DET-07.
          - GSN solution: Timing test report TR-18, section 5.2.
        - Problem: the evidence is linked, but the reason it supports the claim is not explicitly documented anywhere reviewable.
        - Better notation-neutral pattern:
          - Claim: Detection timing meets acceptance criterion AC-DET-07.
          - Solution: Timing test report TR-18, section 5.2.
          - Linked assessment documentation explains:
            - why TR-18 is relevant to this claim
            - which scenarios, configurations, or conditions are covered
            - any uncovered limitations or possible refutation
          - Example CSE note:
          - TR-18 shows measured detection latency below AC-DET-07 for scenarios S1-S12 in configuration C4. This supports the claim for that scenario set and configuration. Degraded sensor mode D3 is not covered and remains outside the supported scope.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better with assessment record"
          text: "See markdown for full bad pattern, problem statement, better pattern, and example CSE note."
    references:
      - source_id: "Weaver"
      - source_id: "Hawkins"
      - source_id: "CAE-Concepts"
      - source_id: "UL4600"
        clauses: ["5.4.2.1(c)(1)-(2)"]
    tool_guidance:
      applicable_elements: ["GSN Solution", "CAE Evidence"]
      detection_hints:
        - "Look for evidence linked to claims without an accompanying inferential explanation."
      suggested_checks:
        - id: "check-inferential-link-documented"
          description: "Check whether the inferential link between claim and evidence is reviewable."
      suggested_ai_prompt: |-
        Draft an inferential explanation linking this evidence to the claim. Include relevance, coverage, and any uncovered limitations.
    tags: ["evidence", "inference"]

  - id: "EV.7"
    category: "EV"
    number: 7
    order: 70
    title: "Keep evidence controlled: owner, version, date, status, repository"
    guideline: |-
      Evidence cited in the safety case should be under configuration or document control, with clear ownership, version or revision, date, status, and a stable retrieval location. Do not rely on mutable live documents as evidence unless the cited version is fixed or the change process explicitly triggers re-assessment of the affected claim.
    why: |-
      Uncontrolled or mutable evidence is hard to verify, maintain, and re-assess. If a cited artifact can change after review, the argument may silently lose validity while still appearing supported.
    review_prompts:
      - "Who owns the evidence?"
      - "Which version or revision is being cited?"
      - "Is the evidence retrieved from a controlled location?"
      - "Is the cited artifact fixed, or can it still change?"
      - "If it is a live document, is there an explicit mechanism that re-assesses affected claims when the document changes?"
      - "Is its status clear, for example draft, in review, approved, or released?"
    example:
      markdown: |-
        - Bad: Evidence: Test summary on team wiki.
        - Problem: The cited source has no fixed revision, no clear approval state, and no stable retrieval point for future review.
        - Better:
          - Evidence: Test summary TSR-11, rev D, approved 2026-03-14, owner Safety Validation Team, stored in the controlled evidence repository.
      cases:
        - role: "bad"
          label: "Bad"
          text: "Evidence: Test summary on team wiki."
        - role: "problem"
          label: "Problem"
          text: "The cited source has no fixed revision, no clear approval state, and no stable retrieval point for future review."
        - role: "better"
          label: "Better"
          text: "Evidence: Test summary TSR-11, rev D, approved 2026-03-14, owner Safety Validation Team, stored in the controlled evidence repository."
    note: |-
      If a live source is used operationally, the cited version and the re-assessment trigger are both defined explicitly.

      This control information does not need to be stored inside the safety case argument itself. It may be managed in a linked repository, evidence register, document management system, or other controlled mechanism, provided the cited evidence remains uniquely identifiable, retrievable, and stable for review.
    references:
      - source_id: "RA1205"
      - source_id: "ONR"
      - source_id: "AVSC-CSE"
        clauses: ["3.8", "6.1", "Table 2"]
      - source_id: "UL4600"
        clauses: ["5.2.2", "5.4.2.1(b)"]
    tool_guidance:
      applicable_elements: ["GSN Solution", "CAE Evidence"]
      detection_hints:
        - "Look for evidence references with no version, date, owner, or controlled location."
      suggested_checks:
        - id: "check-evidence-control-attributes"
          description: "Check whether each evidence reference includes owner, version, date, status, and stable location (directly or via linked control mechanism)."
      suggested_ai_prompt: |-
        Identify missing control attributes for this evidence reference. Propose where (in the case or in a linked register) they should be recorded.
    tags: ["evidence", "control"]

  - id: "EV.8"
    category: "EV"
    number: 8
    order: 80
    title: "Cite fixed evidence, not live mutable content"
    guideline: |-
      Do not cite live mutable content as evidence unless the cited state is fixed, versioned, archived, or otherwise controlled so that the reviewed argument always refers to the same content.
    why: |-
      This rule is the specific citation case of EV.7. If cited evidence can change after review, the safety case may appear supported while its actual evidential basis has changed or disappeared. This breaks reproducibility, reviewability, and configuration control.
    review_prompts:
      - "Could this cited content change without the safety case being updated?"
      - "Is the cited state fixed, versioned, or archived?"
      - "Can a future reviewer retrieve the exact same content that was reviewed?"
      - "If the source is live, is there an explicit process that triggers re-assessment of affected claims when it changes?"
    example:
      markdown: |-
        - Bad: See braking verification page in Confluence.
        - Better: See Braking Verification Plan BVP-04, rev C, approved 2026-03-11.
        - Also acceptable: See archived snapshot of Confluence page CP-118, version 17, captured 2026-03-11.
      cases:
        - role: "bad"
          label: "Bad"
          text: "See braking verification page in Confluence."
        - role: "better"
          label: "Better"
          text: "See Braking Verification Plan BVP-04, rev C, approved 2026-03-11."
        - role: "good"
          label: "Also acceptable"
          text: "See archived snapshot of Confluence page CP-118, version 17, captured 2026-03-11."
    references:
      - source_id: "RA1205"
      - source_id: "ONR"
      - source_id: "AVSC-CSE"
        clauses: ["3.8", "6.1", "Table 2"]
      - source_id: "UL4600"
        clauses: ["5.1.1.1(b)-(c)", "5.2.2", "5.4.1.1(a)"]
    tool_guidance:
      applicable_elements: ["GSN Solution", "CAE Evidence"]
      detection_hints:
        - "Look for citations to wikis, live shared docs, or other mutable URLs without a fixed version or snapshot."
      suggested_checks:
        - id: "check-evidence-state-fixed"
          description: "Check whether the cited content state is fixed, versioned, or archived."
      suggested_ai_prompt: |-
        Identify whether this evidence reference points to mutable content. Propose a fixed reference (versioned artifact or archived snapshot).
    tags: ["evidence", "control", "configuration"]

  - id: "EV.9"
    category: "EV"
    number: 9
    order: 90
    title: "Do not argue directly from undocumented system knowledge"
    guideline: |-
      Do not support claims by relying on undocumented engineering knowledge, design understanding, or verbal explanation. Claims about system behavior, design, interfaces, mitigations, or operating limits should be grounded in controlled documentation or other identified evidence.
    why: |-
      A safety case should argue from reviewable evidence, not from what engineers happen to know. When system knowledge is written directly into the safety case without a supporting source, the argument becomes hard to verify, hard to maintain, and difficult to assess for completeness. It also becomes unclear whether the claim is supported by an approved design basis or only by current team understanding.
    review_prompts:
      - "Is this claim supported by controlled documentation or other identified evidence?"
      - "Is the safety case describing how the system works instead of arguing from documented sources?"
      - "Would the claim still be supportable if the original engineer were unavailable?"
      - "Should this material be moved to a specification, design description, interface definition, hazard analysis, or other work product and then cited as evidence?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: `Unsafe torque requests are prevented during degraded localization.` The safety case includes a free-text explanation of the controller behavior, but the relevant design basis is not identified through context and no supporting artifacts are linked.
        - Problem: the branch relies on undocumented system knowledge written into the safety case itself rather than on explicit specification context and reviewable evidence.
        - Better notation-neutral pattern:
          - Claim: `Unsafe torque requests are prevented during degraded localization.` Context identifies the relevant braking control design specification, degraded-mode requirements, and interface definition.
          - Evidence supports that the specified behavior is implemented and verified.
          - The safety case argues from those documented artifacts instead of serving as the primary description of the design.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better"
          text: "See markdown for the full bad pattern, problem, and better pattern descriptions."
    references:
      - source_id: "UL4600"
        clauses: ["5.1.1.2(e)", "5.3.2.1(a)(2)", "5.7.1.6.1"]
      - source_id: "GSN-v3"
        clauses: ["2:3.7.3"]
      - source_id: "CAE"
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Strategy"]
      detection_hints:
        - "Look for free-text design explanations in the safety case without linked specification or evidence."
      suggested_checks:
        - id: "check-undocumented-knowledge"
          description: "Check whether the argument relies on undocumented system knowledge rather than cited artifacts."
      suggested_ai_prompt: |-
        Identify free-text design knowledge in the safety case that lacks a documented source. Propose what specification, design, or evidence artifact should be cited instead.
    tags: ["evidence", "documentation"]

  # ===== SU. Sufficiency, uncertainty, and pitfall rules =====

  - id: "SU.1"
    category: "SU"
    number: 1
    order: 10
    title: "Identify and address plausible challenges to claims, reasoning, and evidence"
    guideline: |-
      Where a reviewer could reasonably question whether a claim, reasoning step, evidence item, assumption, or stated scope is valid, complete, applicable, or sufficiently reliable, make that challenge explicit and address it where needed.
    why: |-
      A credible safety case should not only present supporting material. It should also make important doubts visible and show how they are handled. This fits well with GSN-style review, where challenge is used to test whether a claim, inference, or supporting material still stands when subjected to scrutiny.
    review_prompts:
      - "What could invalidate this claim or reasoning step?"
      - "What assumptions, confounders, uncertainties, or biases are relevant here?"
      - "Could this evidence be incomplete, misleading, or outside the supported scope?"
      - "Is the challenge really against the claim, the reasoning, the evidence, an assumption, or the stated scope?"
      - "Are important doubts visible in the argument, or left unstated?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Hazard analysis is complete for the defined ODD.
          - Evidence: Hazard analysis report HAR-03.
        - Problem: a reviewer could reasonably ask whether the analysis covered scenarios introduced after the most recent ODD revision, whether the chosen method has known coverage limits for emergent multi-actor interactions, and whether the ODD assumptions still hold. None of these challenges are visible in the argument.
        - Better notation-neutral pattern:
          - Claim: Hazard analysis is complete for the defined ODD.
          - Evidence: Hazard analysis report HAR-03.
          - Challenge: The analysis may not cover scenarios introduced after the most recent ODD revision.
          - Response: Change-impact review CIR-12 confirms newly added scenarios were re-examined.
          - Challenge: The chosen method has known coverage limits for emergent multi-actor interactions.
          - Response: Supplementary scenario-based analysis SBA-04 addresses that gap.
      cases:
        - role: "bad"
          label: "Bad pattern"
          elements:
            claim: ["Hazard analysis is complete for the defined ODD."]
            evidence: ["Hazard analysis report HAR-03."]
        - role: "problem"
          label: "Problem"
          text: "A reviewer could reasonably ask whether the analysis covered scenarios introduced after the most recent ODD revision, whether the chosen method has known coverage limits for emergent multi-actor interactions, and whether the ODD assumptions still hold. None of these challenges are visible in the argument."
        - role: "better"
          label: "Better pattern"
          elements:
            claim: ["Hazard analysis is complete for the defined ODD."]
            evidence: ["Hazard analysis report HAR-03."]
            challenges_and_responses:
              - challenge: "The analysis may not cover scenarios introduced after the most recent ODD revision."
                response: "Change-impact review CIR-12 confirms newly added scenarios were re-examined."
              - challenge: "The chosen method has known coverage limits for emergent multi-actor interactions."
                response: "Supplementary scenario-based analysis SBA-04 addresses that gap."
    references:
      - source_id: "CAE-Review"
      - source_id: "CAE-Defeaters"
      - source_id: "RA1205"
      - source_id: "UL4600"
        clauses: ["5.3.2.2(a)", "5.4.2.2(b)"]
      - source_id: "GSN-v3"
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Strategy", "GSN Solution"]
      detection_hints:
        - "Look for branches presenting only supporting material with no challenges or responses."
      suggested_checks:
        - id: "check-plausible-challenges-addressed"
          description: "Check whether plausible reviewer challenges to the claim, reasoning, or evidence are visible and addressed."
      suggested_ai_prompt: |-
        Generate plausible reviewer challenges for this claim, reasoning step, and evidence. Suggest how each should be addressed or made visible.
    tags: ["sufficiency", "challenge", "defeater"]

  - id: "SU.2"
    category: "SU"
    number: 2
    order: 20
    title: "Make assumptions explicit and justify why they are reasonable"
    guideline: |-
      Do not rely on hidden assumptions. State assumptions explicitly, explain why they are reasonable, and ensure they are monitored or otherwise controlled where needed.
    why: |-
      Unstated or weakly founded assumptions are a common cause of later argument invalidation. That aligns well with UL 4600’s treatment of assumptions and lifecycle monitoring. GSN also treats assumptions as a distinct element type, so checking whether something is really an assumption is appropriate.
    review_prompts:
      - "What must be true for this branch to hold?"
      - "Why is this assumption reasonable, and how would we know if it became false?"
      - "Is this really an assumption, or should it instead be represented as context, a claim, or evidence?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Localization accuracy is acceptable within the defined ODD.
          - The argument silently relies on the assumption that map data used at runtime is current, but this assumption is not recorded.
        - Problem: a reviewer cannot judge whether the assumption is reasonable, whether it is monitored, or what would invalidate it. If the assumption fails, the affected claim may silently lose support.
        - Better notation-neutral pattern:
          - Claim: Localization accuracy is acceptable within the defined ODD.
          - Assumption: Map data used at runtime is no more than 7 days out of date.
          - Justification: Map update process MAP-PROC-02 enforces a 7-day refresh cycle and is monitored by KPI MAP-KPI-01.
          - Re-assessment trigger: Sustained KPI breach or change to the map update process.
      cases:
        - role: "bad"
          label: "Bad pattern"
          elements:
            claim: ["Localization accuracy is acceptable within the defined ODD."]
            hidden_assumption: ["Map data used at runtime is current (not stated)."]
        - role: "problem"
          label: "Problem"
          text: "A reviewer cannot judge whether the assumption is reasonable, whether it is monitored, or what would invalidate it. If the assumption fails, the affected claim may silently lose support."
        - role: "better"
          label: "Better pattern"
          elements:
            claim: ["Localization accuracy is acceptable within the defined ODD."]
            assumption: ["Map data used at runtime is no more than 7 days out of date."]
            justification: ["Map update process MAP-PROC-02 enforces a 7-day refresh cycle and is monitored by KPI MAP-KPI-01."]
            re_assessment_trigger: ["Sustained KPI breach or change to the map update process."]
    references:
      - source_id: "UL4600"
        clauses: ["5.4.1.3(a)(11)", "5.4.2.2(a)(3)", "5.4.1.6.2"]
      - source_id: "GSN-v3"
        clauses: ["0:4.6", "1:2.2.17"]
    tool_guidance:
      applicable_elements: ["GSN Assumption"]
      detection_hints:
        - "Look for branches whose validity depends on a condition that is not stated as an assumption or context."
      suggested_checks:
        - id: "check-explicit-assumptions"
          description: "Check whether implicit assumptions are made explicit, justified, and monitorable."
      suggested_ai_prompt: |-
        Identify implicit assumptions in this branch. For each, propose explicit assumption text, a justification of reasonableness, and any monitoring needed.
    tags: ["sufficiency", "assumption"]

  - id: "SU.3"
    category: "SU"
    number: 3
    order: 30
    title: "Do not rely on uncorroborated expert judgment alone"
    guideline: |-
      Do not rely on expert judgment alone unless its basis, limits, and corroborating support are stated, or the residual uncertainty is monitored over the lifecycle where appropriate.
    why: |-
      Expert opinion may be useful, but unsupported opinion is weak support and can easily outstate what is actually known.
    review_prompts:
      - "Is the opinion supported by data, literature, documented analysis, or another explicit technical basis?"
      - "Is the context of applicability clear and argued?"
      - "If the opinion remains weakly supported, is lifecycle monitoring in place where needed?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Residual risk is acceptable.
          - Evidence: Safety review board statement that residual risk is considered acceptable.
        - Problem: expert judgment is being used as the sole basis for the claim, with no analysis, data, or independent corroboration that a reviewer can examine.
        - Better notation-neutral pattern:
          - Claim: Residual risk is acceptable.
          - Evidence: Quantitative risk analysis QRA-09 showing residual risk below the defined threshold.
          - Evidence: Operational data summary ODS-03 covering 18 months of comparable exposure with no injury-class events.
          - Expert review: Safety review board record SRB-2026-04 confirming the analysis method, inputs, and conclusion are consistent with established practice.
          - Note: Expert review is corroborating, not substituting for, the underlying analysis and data.
      cases:
        - role: "bad"
          label: "Bad pattern"
          elements:
            claim: ["Residual risk is acceptable."]
            evidence: ["Safety review board statement that residual risk is considered acceptable."]
        - role: "problem"
          label: "Problem"
          text: "Expert judgment is being used as the sole basis for the claim, with no analysis, data, or independent corroboration that a reviewer can examine."
        - role: "better"
          label: "Better pattern"
          elements:
            claim: ["Residual risk is acceptable."]
            evidence:
              - "Quantitative risk analysis QRA-09 showing residual risk below the defined threshold."
              - "Operational data summary ODS-03 covering 18 months of comparable exposure with no injury-class events."
            expert_review: ["Safety review board record SRB-2026-04 confirming the analysis method, inputs, and conclusion are consistent with established practice."]
            note: ["Expert review is corroborating, not substituting for, the underlying analysis and data."]
    references:
      - source_id: "UL4600"
        clauses: ["5.4.2.2(a)(1)", "5.4.2.6.3"]
      - source_id: "AVSC-CSE"
        clauses: ["6.1-6.3"]
    tool_guidance:
      applicable_elements: ["GSN Solution", "GSN Justification"]
      detection_hints:
        - "Look for evidence consisting only of expert statements without supporting analysis or data."
      suggested_checks:
        - id: "check-expert-judgment-corroboration"
          description: "Check whether expert judgment is corroborated by data, analysis, or lifecycle monitoring."
      suggested_ai_prompt: |-
        Identify whether expert judgment is the sole basis for this claim. Propose corroborating analysis, data, or lifecycle monitoring that should accompany it.
    tags: ["sufficiency", "expert-judgment"]

  - id: "SU.4"
    category: "SU"
    number: 4
    order: 40
    title: "Monitor claims that cannot be fully supported at design time"
    guideline: |-
      When a claim cannot be fully supported at design time, make the remaining uncertainty explicit and define lifecycle monitoring that can confirm or challenge the claim during operation.
    why: |-
      Some claims depend partly on assumptions, limited evidence, or expected field behavior. In such cases, the safety case should not hide the remaining uncertainty. It should explain it and define how operation will provide feedback.
    review_prompts:
      - "What part of this claim is not fully supported at design time?"
      - "Can that remaining uncertainty only be reduced through operational or field data?"
      - "Is lifecycle monitoring defined for that uncertainty?"
      - "Are reassessment triggers identified?"
    example:
      markdown: |-
        - Claim: Unexpected roadside object class X is sufficiently rare that residual risk is acceptable.
        - Current support: design-time analysis suggests object class X is rare, but the available data is limited and does not fully establish its operational frequency.
        - Acceptable treatment:
          - state explicitly that the rarity assumption is not fully confirmed at design time
          - define field monitoring for the occurrence of roadside object class X
          - define reassessment triggers, for example if observed frequency or associated incidents exceed threshold T
        - Not acceptable:
          - treat the rarity assumption as fully proven without any operational follow-up
      cases:
        - role: "informative"
          label: "Acceptable vs not acceptable lifecycle treatment"
          text: "See markdown for the full claim, current support, acceptable treatment, and not acceptable treatment."
    references:
      - source_id: "ISO-21448"
        clauses: ["12.3-12.4", "13.1-13.4"]
      - source_id: "UL4600"
        clauses: ["5.4.2.2(a)", "5.4.2.3(c)"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Assumption"]
      detection_hints:
        - "Look for claims with partial design-time support and no defined lifecycle monitoring."
      suggested_checks:
        - id: "check-lifecycle-monitoring"
          description: "Check whether claims with residual design-time uncertainty have defined monitoring and reassessment triggers."
      suggested_ai_prompt: |-
        Identify the residual design-time uncertainty in this claim. Propose lifecycle monitoring and reassessment triggers that would close it during operation.
    tags: ["sufficiency", "lifecycle", "monitoring"]

  - id: "SU.5"
    category: "SU"
    number: 5
    order: 50
    title: "Do not reuse safety credit from another context without showing it still applies"
    guideline: |-
      Do not rely on safety credit from proven-in-use technology, legacy technology, COTS, prior assessments, standard conformance, or prior practice unless you show that the original context is sufficiently comparable to the current one.
    why: |-
      Safety confidence gained in one context does not automatically remain valid in another. Differences in operating environment, purpose, interfaces, duty cycle, autonomy role, or assumptions can invalidate the reuse.
    review_prompts:
      - "What safety confidence, evidence, or assessment result is being reused from another context?"
      - "Is the original operating context sufficiently comparable to the current one?"
      - "Have differences in purpose, environment, interfaces, or assumptions been identified?"
      - "Have the limitations of the original assessment been stated?"
    example:
      markdown: |-
        - Bad claim:
          - This camera is proven in use and is therefore acceptable for autonomous truck operation.
        - Problem:
          - The claim takes safety credit from another context without showing that the original application, operating conditions, interfaces, and safety role are sufficiently comparable.
        - Better claim:
          - Reuse of camera safety credit is justified for the current application.
          - Context:
          - Original application: conventional passenger vehicle ADAS use.
          - Current application: autonomous heavy truck operation.
          - Justification (if needed):
          - Safety credit may only be reused if the original and current contexts are shown to be sufficiently comparable in the aspects that matter to safety.
          - Possible subclaims:
            - The original and current operating environments are sufficiently comparable.
            - The original and current duty cycles are sufficiently comparable.
            - The original and current interfaces and installation conditions are sufficiently comparable.
            - The original and current safety roles and failure consequences are sufficiently comparable.
            - Any non-comparable differences are addressed by additional evidence or explicit limitations.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better"
          text: "See markdown for the full bad claim, problem, and better-pattern context, justification, and subclaims."
    references:
      - source_id: "UL4600"
        clauses: ["5.3.3.2(c)", "5.3.2.2(b)-(c)"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Justification"]
      detection_hints:
        - "Look for proven-in-use or legacy claims with no comparability argument."
      suggested_checks:
        - id: "check-context-comparability"
          description: "Check whether reused safety credit is supported by an explicit comparability argument."
      suggested_ai_prompt: |-
        Identify any safety credit being reused from another context. Propose subclaims that establish whether the contexts are sufficiently comparable.
    tags: ["sufficiency", "reuse"]

  - id: "SU.6"
    category: "SU"
    number: 6
    order: 60
    title: "Do not dismiss operational feedback because it is non-reproducible or non-injury"
    guideline: |-
      When a claim relies on operational experience, field monitoring, incident history, or proven-in-use style reasoning, do not dismiss incidents, near misses, anomalies, or failure reports merely because they have not recurred, cannot yet be reproduced, or did not lead to harm.
    why: |-
      Operational feedback is often used to support claims about residual risk, rarity, adequacy of existing controls, or continued acceptability in service. In those branches, non-injury or non-reproducibility does not make a signal irrelevant. Several weak signals together may show that the argument is less reliable than it appears.
    review_prompts:
      - "Is this branch relying on operational experience or field feedback as part of its support?"
      - "Are incidents defined broadly enough to include near misses, close calls, and anomalies that could have led to harm?"
      - "Is adverse operational feedback being screened out too aggressively?"
      - "Is the argument considering the combined signal from multiple incidents or anomalies?"
      - "Is adverse operational evidence explicitly recorded, evaluated, and addressed?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Residual risk from unexpected roadside object encounters is acceptable in operation.
          - Support used: field incident history and operational monitoring.
          - Safety case note: Three roadside-object anomalies were reported, but none caused injury and none could be reproduced, so they are not safety-relevant.
        - Problem: the argument is using operational feedback, but dismisses adverse signals simply because they were non-injury and non-reproducible.
        - Better notation-neutral pattern:
          - Claim: Residual risk from unexpected roadside object encounters is acceptable in operation.
          - Support used: field incident history and operational monitoring.
          - Safety case treatment: the three anomalies are recorded, grouped, and evaluated as adverse operational evidence. The argument explains whether they challenge the rarity assumption, whether they indicate a gap in object coverage, and whether reassessment or additional mitigation is required.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better"
          text: "See markdown for the full bad pattern, problem, and better-pattern treatment of adverse operational feedback."
    references:
      - source_id: "RA1205"
      - source_id: "ONR-SAPs"
      - source_id: "UL4600"
        clauses: ["5.3.3.2(d)"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Solution"]
      detection_hints:
        - "Look for arguments that use operational data and discount non-injury or non-reproducible incidents."
      suggested_checks:
        - id: "check-operational-feedback-treatment"
          description: "Check whether adverse operational feedback is recorded, grouped, and evaluated rather than silently dismissed."
      suggested_ai_prompt: |-
        Identify whether adverse operational feedback is being dismissed for non-injury or non-reproducibility reasons. Propose how the signals should be recorded and evaluated.
    tags: ["sufficiency", "operational-feedback"]

  - id: "SU.7"
    category: "SU"
    number: 7
    order: 70
    title: "Do not argue low risk from operational experience or unvalidated simulation alone"
    guideline: |-
      Do not infer low risk for a known hazard solely from uneventful operational history or from simulation whose credibility for the claim has not been demonstrated.
    why: |-
      Operational exposure can miss catastrophic but rare outcomes. Simulation can miss modeling defects and abstraction errors.
    review_prompts:
      - "Is simulation alone being treated as enough to show low risk?"
      - "Is operational history alone being treated as enough to show low risk?"
      - "Has simulation validity for this claim not been shown?"
      - "Are corroborating evidence, scenario limits, or model limitations missing?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Collision risk with cut-in vehicles is low.
          - Evidence: Simulation results SIM-12.
          - Justification: No collisions were observed in the simulation results, therefore the risk is low.
        - Problem: the branch treats simulation results alone as sufficient proof that risk is low, without showing that the simulation is valid for this claim, that the modeled scenarios are adequate, or that important model limitations are understood.
        - Better notation-neutral pattern:
          - Claim: Collision risk with cut-in vehicles is acceptably low.
          - Evidence: Simulation results SIM-12.
          - Evidence: Track test report TR-08.
          - Evidence: Field incident review FR-03.
          - The argument explains: why SIM-12 is valid for this hazard and what scenario space it covers what limitations remain in the simulation model how TR-08 corroborates important behaviors in representative test conditions how FR-03 is used to check whether operational experience challenges the claim
      cases:
        - role: "informative"
          label: "Bad / Problem / Better"
          text: "See markdown for the full bad pattern, problem, and better-pattern multi-evidence treatment."
    references:
      - source_id: "UNECE-ADS"
      - source_id: "ISO-21448"
      - source_id: "UL4600"
        clauses: ["5.3.3.2(i)-(j)", "5.4.2.1(c)"]
    tool_guidance:
      applicable_elements: ["GSN Solution", "GSN Justification"]
      detection_hints:
        - "Look for low-risk claims supported only by simulation or only by uneventful operational time."
      suggested_checks:
        - id: "check-low-risk-evidence-mix"
          description: "Check whether low-risk claims combine multiple corroborating evidence types and address simulation validity."
      suggested_ai_prompt: |-
        Identify whether this low-risk claim relies solely on simulation or solely on operational history. Propose corroborating evidence and validity arguments.
    tags: ["sufficiency", "simulation", "operational-experience"]

  - id: "SU.8"
    category: "SU"
    number: 8
    order: 80
    title: "Do not assume human data or human-designed tests cover autonomy-specific failures"
    guideline: |-
      Do not assume that human-operated data sets or human-designed test plans are sufficient to cover autonomy-specific failures or edge cases.
    why: |-
      Autonomous systems can encounter operating situations and failure combinations that are uncommon in human driving. Human-derived data and human-designed tests may therefore miss important autonomy-specific risks.
    review_prompts:
      - "Is the claim supported mainly by human-operated data or human-designed tests?"
      - "Could the autonomous system encounter situations or create hazards that are uncommon in human driving?"
      - "Are autonomy-specific failure modes and edge cases explicitly considered?"
      - "Is there evidence that the test basis covers autonomy-specific failures, not only human-driving situations?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Planning failure modes are adequately covered by the test set.
          - Evidence: Scenario Selection Report SSR-04.
          - Justification: The scenario set is based on human-driven fleet data and therefore covers relevant road situations.
        - Problem: the branch assumes that human-driven data is enough to cover planning failures, but the autonomous planner may enter unusual states or produce behaviors that human drivers would not normally create.
        - Better notation-neutral pattern:
          - Claim: Planning failure modes are adequately covered by the test set.
          - Evidence: Scenario Selection Report SSR-04.
          - Evidence: Planner Failure Analysis Report PFA-03.
          - Evidence: Edge Case Test Specification ETS-07.
          - Justification: Coverage is based not only on human-driven scenarios, but also on autonomy-specific planner failure analysis and identified edge cases.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better"
          text: "See markdown for the full bad pattern, problem, and better-pattern coverage argument."
    references:
      - source_id: "ISO-21448"
        clauses: ["7.1-7.4", "9.1-9.3", "10-11"]
      - source_id: "UL4600"
        clauses: ["5.3.3.2(e)", "5.3.3.2(g)", "5.4.2.2(b)"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Solution"]
      detection_hints:
        - "Look for claims about autonomy coverage backed only by human-driven datasets or human-designed scenarios."
      suggested_checks:
        - id: "check-autonomy-coverage"
          description: "Check whether the test basis covers autonomy-specific failure modes and edge cases."
      suggested_ai_prompt: |-
        Identify whether autonomy-specific failure modes are covered by the cited test basis. Propose what additional analysis or tests would address the gap.
    tags: ["sufficiency", "autonomy", "coverage"]

  - id: "SU.9"
    category: "SU"
    number: 9
    order: 90
    title: "Document unstated assumptions at the point of use"
    guideline: |-
      When a claim or reasoning step depends on something that is not currently stated, make that dependency explicit at the point where it constrains the argument, using an assumption, context element, or subclaim as appropriate.
    why: |-
      Hidden dependencies are a common reason for late argument invalidation. Making them visible helps the reviewer see what the branch depends on and decide whether that dependency should remain an assumption, be stated as context, or be argued as a claim.
    review_prompts:
      - "What must be true for this claim or strategy to hold, but is not currently stated?"
      - "Is the hidden dependency local to the claim, or to the reasoning step?"
      - "Should this dependency be represented as an assumption, as context, or as a claim that must be proved?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Localization integrity is sufficient for safe fallback.
        - Problem: the branch depends on an unstated condition about localization performance during fallback, but that dependency is only implicit.
        - Better notation-neutral pattern:
          - Claim: Localization integrity is sufficient for safe fallback.
          - Assumption: Localization integrity remains within bound L1 during fallback maneuver.
        - Or, if that dependency should be argued rather than assumed:
          - Claim: Localization integrity is sufficient for safe fallback.
          - Subclaim: Localization integrity remains within bound L1 during fallback maneuver.
          - Evidence: Fallback localization analysis report FLA-03.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better (assumption or subclaim)"
          text: "See markdown for the full bad pattern, problem, and two better-pattern variants."
    references:
      - source_id: "UL4600"
        clauses: ["5.4.1.3(a)(11)", "5.4.1.6.2", "5.4.2.2(a)(3)"]
      - source_id: "GSN-v3"
        clauses: ["0:4.6", "1:2.2.12", "1:2.2.17"]
    tool_guidance:
      applicable_elements: ["GSN Assumption", "GSN Context", "GSN Goal"]
      detection_hints:
        - "Look for claims whose validity depends on conditions not stated as assumption, context, or subclaim."
      suggested_checks:
        - id: "check-unstated-dependencies"
          description: "Check whether unstated dependencies are made visible at the point of use."
      suggested_ai_prompt: |-
        Identify any hidden dependency in this claim. Recommend whether it should become an assumption, a context element, or a subclaim.
    tags: ["sufficiency", "assumption", "dependency"]

  - id: "SU.10"
    category: "SU"
    number: 10
    order: 100
    title: "Keep assumptions bounded, specific, and monitorable"
    guideline: |-
      Do not use assumptions that are broader than the claim scope or so vague that they cannot be checked, challenged, or monitored.
    why: |-
      Over-broad assumptions can make a claim appear closed while removing most of its review value. If an argument depends on an assumption, the assumption should be narrow enough to understand, evaluate, and monitor where needed.
    review_prompts:
      - "Is the assumption matched to the scope of the claim it constrains?"
      - "Can the assumption be checked, challenged, or monitored?"
      - "Does the assumption hide several different dependencies that should be separated?"
      - "Would the branch become clearer if the assumption were narrowed or split?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Traffic signal interpretation is sufficiently reliable for safe intersection handling.
          - Assumption: Infrastructure behaves correctly.
        - Problem: the assumption is too broad. It does not identify which infrastructure, which behaviors, which authorities, or what kinds of failure are being assumed away.
        - Better notation-neutral pattern:
          - Claim: Traffic signal interpretation is sufficiently reliable for safe intersection handling.
          - Assumption: Within the defined ODD, traffic signals managed by the identified road authorities are assumed to conform to the referenced control standard.
          - Monitoring / follow-up support where needed: Violations are tracked through field feedback and incident analysis.
        - Or, if several dependencies are actually involved:
          - Assumption: Traffic signal installations in the defined ODD conform to the referenced control standard.
          - Assumption: Detected traffic signal anomalies are captured through field feedback.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better (single bounded assumption or multiple)"
          text: "See markdown for the full bad pattern, problem, and better-pattern variants."
    references:
      - source_id: "UL4600"
        clauses: ["5.4.2.2(a)(3)", "10.5.1.2(b),(h)", "12.5.1.2(c)(1)", "12.5.2.2(b)"]
      - source_id: "GSN-v3"
        clauses: ["1:2.2.12", "1:2.2.17"]
    tool_guidance:
      applicable_elements: ["GSN Assumption"]
      detection_hints:
        - "Look for assumptions that are vague, universal, or unmonitorable."
      suggested_checks:
        - id: "check-assumption-bounded"
          description: "Check whether each assumption is narrow, specific, and monitorable where needed."
      suggested_ai_prompt: |-
        Assess whether this assumption is bounded and monitorable. Propose a narrower restatement or split into multiple specific assumptions.
    tags: ["sufficiency", "assumption"]

  - id: "SU.11"
    category: "SU"
    number: 11
    order: 110
    title: "Turn plausible reviewer challenges into explicit Counter Claims and resolve them"
    guideline: |-
      When review raises a plausible What if X? challenge, make that challenge explicit as a Counter Claim and resolve it visibly in the safety case. The resolution may reject the Counter Claim, narrow or revise the original claim, add supporting evidence, introduce assumptions and monitoring, or leave a visible open issue if the matter is not yet resolved.
    why: |-
      A credible safety case should not leave plausible challenges only in review comments or reviewer intuition. Good reviews expose weaknesses early. Making the challenge explicit helps ensure that it is either resolved properly or left visible until it is resolved.
    review_prompts:
      - "What exactly is the reviewer challenge?"
      - "Should this challenge be made explicit as a Counter Claim?"
      - "Has the Counter Claim been rejected, sustained, or left unresolved?"
      - "If sustained, has the original branch been updated appropriately?"
      - "If unresolved, is the open issue visible and traceable?"
    example:
      markdown: |-
        - Initial branch:
          - Claim: Fallback behavior is acceptably safe.
        - Reviewer challenge:
          - What if localization drops out during fallback?
        - Make the challenge explicit:
          - Counter Claim: Fallback behavior is not acceptably safe if localization drops out during fallback.
          - Status: Undeveloped (while analysis is ongoing)
        - Possible resolution 1 — Counter Claim rejected:
          - Evidence: Fallback localization analysis FLA-04.
          - Evidence: Fallback test report FTR-09.
          - Updated Claim: Fallback behavior is acceptably safe.
        - Possible resolution 2 — Counter Claim sustained, original claim narrowed:
          - Updated Claim: Fallback behavior is acceptably safe under conditions with validated localization continuity.
        - Possible resolution 3 — Counter Claim partly sustained, assumption plus monitoring added:
          - Claim: Fallback behavior is acceptably safe.
          - Assumption: Localization continuity is maintained during fallback.
          - Monitoring: Localization continuity violations are tracked through operational monitoring and incident review.
        - Possible resolution 4 — not yet resolved:
          - Open Issue: Impact of localization dropout during fallback remains unresolved and requires additional analysis.
      cases:
        - role: "informative"
          label: "Initial / Challenge / Counter Claim / Four resolutions"
          text: "See markdown for the full initial branch, reviewer challenge, explicit Counter Claim, and four resolution variants."
    references:
      - source_id: "CAE-Review"
      - source_id: "CAE-Defeaters"
      - source_id: "RA1205"
      - source_id: "UL4600"
        clauses: ["5.3.2.2(a)", "5.3.2.3(c)(1)-(2)", "5.4.2.2(b)", "5.4.2.3(a)"]
      - source_id: "GSN-v3"
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Counter Claim"]
      detection_hints:
        - "Look for plausible reviewer challenges that have not been promoted into the safety case."
      suggested_checks:
        - id: "check-counter-claims-resolved"
          description: "Check whether plausible reviewer challenges are made explicit as Counter Claims and visibly resolved."
      suggested_ai_prompt: |-
        Promote plausible reviewer challenges to this branch into explicit Counter Claims. For each, propose a resolution path (reject, narrow, add evidence, add assumption with monitoring, or open issue).
    tags: ["sufficiency", "counter-claim", "challenge"]

  # ===== LF. Logical fallacy rules =====

  - id: "LF.1"
    category: "LF"
    number: 1
    order: 10
    title: "Avoid circular reasoning"
    guideline: |-
      Do not support a claim by restating it, renaming it, or assuming it in the support.
    why: |-
      Circular support creates the appearance of argument without adding any new support.
    review_prompts:
      - "Would the support still work if the parent claim were not assumed true?"
      - "Is the same conclusion being repeated with different words?"
    example:
      markdown: |-
        - Bad claim: The system is acceptably safe because the safety case shows acceptable safety.
      cases:
        - role: "bad"
          label: "Bad claim"
          text: "The system is acceptably safe because the safety case shows acceptable safety."
    references:
      - source_id: "Greenwell-2006"
      - source_id: "UL4600"
        clauses: ["5.3.3.1(a)", "5.3.3.2(a)", "5.3.3"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Strategy"]
      detection_hints:
        - "Look for support that restates or renames the parent claim."
      suggested_checks:
        - id: "check-circular-support"
          description: "Check whether support adds independent reasoning or merely restates the claim."
      suggested_ai_prompt: |-
        Identify circular reasoning in this branch. Propose support that adds independent grounds rather than restating the claim.
    tags: ["fallacy", "circular"]

  - id: "LF.2"
    category: "LF"
    number: 2
    order: 20
    title: "Avoid irrelevant premises"
    guideline: |-
      Do not use evidence or supporting statements that may be true but do not support the immediate claim being made.
    why: |-
      A common defect is to attach true or relevant material to the wrong claim, so the branch appears supported even though the actual inference is missing.
    review_prompts:
      - "Does this evidence support this exact claim?"
      - "Is the evidence only relevant to a different or neighboring claim?"
      - "Is the missing support actually a different intermediate claim that has not been stated?"
    example:
      markdown: |-
        - Bad claim: Brake fault handling is acceptable.
          - Bad evidence: Brake fault handling requirements are documented.
        - Problem: documented requirements may be necessary, but they do not by themselves show that brake fault handling is acceptable.
        - Better notation-neutral pattern:
          - Claim: Brake fault handling is acceptable.
          - Subclaim: Brake fault handling requirements are correctly defined.
          - Subclaim: Implemented brake fault handling satisfies the defined requirements.
          - Evidence: Brake fault handling requirements specification BRS-04.
          - Evidence: Brake fault handling verification report BVR-09.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better"
          text: "See markdown for the full bad claim, problem, and better-pattern decomposition."
    references:
      - source_id: "Greenwell-2006"
      - source_id: "UL4600"
        clauses: ["5.3.3.1(a)", "5.3.3.2(a)", "5.3.2.1(a)(1)"]
    tool_guidance:
      applicable_elements: ["GSN Solution", "GSN Goal"]
      detection_hints:
        - "Look for evidence whose actual scope supports a different claim than the one it is attached to."
      suggested_checks:
        - id: "check-evidence-relevance"
          description: "Check whether each evidence item supports the immediate claim it is attached to."
      suggested_ai_prompt: |-
        Identify whether the cited evidence supports this exact claim. If not, propose intermediate sub-claims that would close the inferential gap.
    tags: ["fallacy", "relevance"]

  - id: "LF.3"
    category: "LF"
    number: 3
    order: 30
    title: "Avoid arguing from ignorance"
    guideline: |-
      Do not treat lack of discovered evidence against a claim as positive evidence for the claim.
    why: |-
      Not finding a problem is not the same as showing that the problem does not exist. Claims about completeness or absence need support from the search basis, scope, and adequacy of the methods used.
    review_prompts:
      - "Is not found being treated as does not exist?"
      - "Is the claim really about completeness of the search, rather than absolute absence?"
      - "Was the search for contrary evidence demonstrably adequate for the stated scope?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: No other credible hazards exist.
          - Evidence: HARA report HAR-03.
          - Justification: The HARA identified all relevant hazards, and no further hazards were found.
        - Problem: the branch treats the absence of newly discovered hazards as proof that no other credible hazards exist.
        - Better notation-neutral pattern:
          - Claim: Hazard identification is sufficiently complete for the defined scope.
          - Context: Applies to the defined item, ODD, and lifecycle scope.
          - Evidence: HARA report HAR-03.
          - Evidence: STPA report STP-02.
          - Evidence: Hazard review record HRR-07.
          - Justification: Complementary hazard identification methods and review coverage have been applied for the defined scope.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better"
          text: "See markdown for the full bad pattern, problem, and better-pattern multi-method coverage."
    references:
      - source_id: "Greenwell-2006"
      - source_id: "UL4600"
        clauses: ["5.3.3.1(a)", "5.3.3.2(a)", "5.4.2.3(a)"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Justification"]
      detection_hints:
        - "Look for completeness or absence claims justified only by absence-of-finding."
      suggested_checks:
        - id: "check-completeness-vs-absence"
          description: "Check whether absence-based claims are reframed as bounded completeness claims with adequate search coverage."
      suggested_ai_prompt: |-
        Identify whether this claim treats absence of findings as proof of absence. Propose a bounded completeness claim with adequate search basis and coverage.
    tags: ["fallacy", "completeness"]

  - id: "LF.4"
    category: "LF"
    number: 4
    order: 40
    title: "Avoid unjustified comparison or unjustified distinction"
    guideline: |-
      Do not claim that one case is equivalent to, safer than, better than, or different from another unless the basis of comparison or distinction is explicit and relevant to the claim being made.
    why: |-
      Comparison-based arguments can look persuasive while hiding differences in scope, operating conditions, metrics, evidence quality, or confidence. Distinctions can also be misused to dismiss relevant comparators without showing why the difference matters.
    review_prompts:
      - "What exactly is being compared or distinguished?"
      - "Is the basis of comparison or distinction explicit?"
      - "Are the compared cases matched in scope, operating conditions, metrics, and confidence level?"
      - "If a difference is claimed, is it shown why that difference matters to the argument?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: The autonomous vehicle is safer than a human driver.
          - Evidence: Simulation report SIM-09.
          - Justification: The autonomous vehicle had fewer simulated collisions than the human-driver baseline.
        - Problem: the comparison may be unjustified if the simulation conditions, scenario coverage, driver model, metrics, and confidence are not shown to be appropriate and comparable.
        - Better notation-neutral pattern:
          - Claim: For the defined ODD and stated comparison metric, the autonomous vehicle has lower collision rate than the specified human-driver baseline.
          - Context: Comparison applies to ODD-A, metric M1, and baseline definition BD-02.
          - Evidence: Simulation report SIM-09.
          - Evidence: Baseline comparison report BCR-03.
          - Evidence: Scenario validity report SVR-04.
          - Justification: The compared cases use matched scope, scenarios, metrics, and confidence basis.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better"
          text: "See markdown for the full bad pattern, problem, and better-pattern matched comparison."
    references:
      - source_id: "Greenwell-2006"
      - source_id: "UL4600"
        clauses: ["5.3.3.1(a)", "5.3.3.2(a)", "5.3.3.2(c)"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Justification"]
      detection_hints:
        - "Look for safer-than or different-from claims without an explicit basis of comparison."
      suggested_checks:
        - id: "check-comparison-basis"
          description: "Check whether comparisons or distinctions are matched in scope, conditions, metrics, and confidence."
      suggested_ai_prompt: |-
        Identify the basis of comparison or distinction for this claim. Propose context and evidence that would establish that the compared cases are matched.
    tags: ["fallacy", "comparison"]

  - id: "LF.5"
    category: "LF"
    number: 5
    order: 50
    title: "Avoid sample-size and representativeness fallacies"
    guideline: |-
      Do not generalize too far from too little data, or from data that does not match the operating context being claimed.
    why: |-
      A small or skewed data set can support only a correspondingly narrow claim.
    review_prompts:
      - "Is the sample size adequate for the confidence implied?"
      - "Does the data distribution match the ODD and edge cases?"
      - "Is the claim broader than the sample supports?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: The item is acceptably safe across the defined ODD.
          - Evidence: Road test report RTR-05 covering 12 daylight highway runs in dry conditions.
          - Justification: No safety-critical events were observed during testing.
        - Problem: the claim covers the full ODD, but the evidence covers only a small and narrow subset of operating conditions. The sample is too limited in size and representativeness to support the broader claim.
        - Better notation-neutral pattern:
          - Claim: The item is acceptably safe for the tested daytime highway subset of the ODD.
          - Context: Applies only to dry daytime highway operation under the conditions covered in RTR-05.
          - Evidence: Road test report RTR-05.
        - Or, if the broader claim is to be kept:
          - Claim: The item is acceptably safe across the defined ODD.
          - Evidence: Road test report RTR-05.
          - Evidence: Night and weather test report NWT-03.
          - Evidence: Scenario coverage analysis SCA-04.
          - Evidence: Edge-case test report ETR-02.
          - Justification: The combined evidence set provides coverage across the claimed ODD, including relevant distributions and edge cases.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better (narrowed claim or expanded evidence)"
          text: "See markdown for the full bad pattern, problem, and two better-pattern variants."
    references:
      - source_id: "Greenwell-2006"
    tool_guidance:
      applicable_elements: ["GSN Solution", "GSN Goal"]
      detection_hints:
        - "Look for broad claims supported by narrow or small data sets."
      suggested_checks:
        - id: "check-sample-coverage"
          description: "Check whether sample size and representativeness match the breadth of the claim."
      suggested_ai_prompt: |-
        Identify whether the cited sample supports the breadth of this claim. Propose either narrowing the claim or expanding the evidence set.
    tags: ["fallacy", "sampling"]

  - id: "LF.6"
    category: "LF"
    number: 6
    order: 60
    title: "Avoid pseudo-precision"
    guideline: |-
      Do not present numerical precision beyond what the evidence, model, assumptions, or method can justify.
    why: |-
      A highly precise number can give a false impression of certainty. When uncertainty, confidence, model limits, or input assumptions are weak, the stated precision should reflect that.
    review_prompts:
      - "Does the number imply a level of certainty the method cannot support?"
      - "Are uncertainty, assumptions, and confidence bounds stated where needed?"
      - "Is the stated precision greater than the quality of the underlying evidence or model?"
      - "Would a rounded value or bounded statement better reflect the real knowledge state?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Residual collision risk is 3.742 x 10^-7 per hour.
          - Evidence: Quantitative risk analysis report QRA-05.
        - Problem: the stated value suggests a level of certainty that may not be justified by the model assumptions, input data quality, scenario coverage, or confidence bounds.
        - Better notation-neutral pattern:
          - Claim: Residual collision risk is below the accepted threshold for the defined operating conditions.
          - Context: Applies under the assumptions and scenario scope defined in QRA-05.
          - Evidence: Quantitative risk analysis report QRA-05.
          - Justification: The result is reported with precision consistent with model uncertainty and stated confidence.
        - Or, where a numeric claim is still appropriate:
          - Claim: Residual collision risk is estimated to be on the order of 10^-7 per hour for the defined operating conditions.
          - Context: Estimate is subject to the assumptions, uncertainty, and confidence limits stated in QRA-05.
          - Evidence: Quantitative risk analysis report QRA-05.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better (qualitative or order-of-magnitude)"
          text: "See markdown for the full bad pattern, problem, and two better-pattern variants."
    references:
      - source_id: "Greenwell-2006"
    tool_guidance:
      applicable_elements: ["GSN Goal"]
      detection_hints:
        - "Look for many-significant-digit numerical claims without uncertainty or confidence statement."
      suggested_checks:
        - id: "check-stated-precision"
          description: "Check whether numerical precision is consistent with model and data uncertainty."
      suggested_ai_prompt: |-
        Identify pseudo-precision in this numerical claim. Propose a wording with precision consistent with the underlying uncertainty.
    tags: ["fallacy", "precision"]

  - id: "LF.7"
    category: "LF"
    number: 7
    order: 70
    title: "Avoid omission of key evidence and ignoring counter-evidence"
    guideline: |-
      Do not omit evidence that a skeptical reviewer would naturally expect, and do not leave known contrary evidence unanswered.
    why: |-
      A safety case becomes misleading when it presents only supporting material and leaves out evidence that could weaken, limit, or challenge the claim.
    review_prompts:
      - "What evidence would a critical reviewer reasonably expect to see for this claim?"
      - "Is any known anomaly, failure, exclusion, or limitation being left unaddressed?"
      - "Does the omitted material affect the meaning, scope, or credibility of the claim?"
      - "Is contrary evidence explicitly addressed rather than silently ignored?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Sensor robustness is acceptable.
          - Evidence: Sensor performance test report SPR-08.
          - Justification: The reported test results show robust detection performance.
        - Problem: the branch cites supportive performance results but omits known obscuration, contamination, or environmental degradation evidence that a reviewer would naturally expect for a robustness claim.
        - Better notation-neutral pattern:
          - Claim: Sensor robustness is acceptable for the defined conditions.
          - Evidence: Sensor performance test report SPR-08.
          - Evidence: Obscuration test report OTR-03.
          - Evidence: Environmental degradation test report EDR-05.
          - Justification: The argument addresses both supporting and limiting evidence for the claimed operating conditions.
        - Or, if contrary evidence exists:
          - Claim: Sensor robustness is acceptable for the defined conditions.
          - Evidence: Sensor performance test report SPR-08.
          - Evidence: Environmental degradation anomaly review EAR-02.
          - Context: Claim excludes heavy mud obscuration beyond the tested condition range.
          - Justification: Known degradation limits are explicitly addressed and reflected in the claim scope.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better (expanded coverage or scoped exclusion)"
          text: "See markdown for the full bad pattern, problem, and two better-pattern variants."
    references:
      - source_id: "Greenwell-2006"
    tool_guidance:
      applicable_elements: ["GSN Solution", "GSN Goal"]
      detection_hints:
        - "Look for branches that present only supporting evidence with no acknowledgement of known limits or contrary evidence."
      suggested_checks:
        - id: "check-counter-evidence-treatment"
          description: "Check whether known limiting or contrary evidence is addressed or scoped out."
      suggested_ai_prompt: |-
        Identify likely omitted or contrary evidence for this claim. Propose how it should be cited and addressed (or how the claim should be scoped to reflect it).
    tags: ["fallacy", "omission", "counter-evidence"]

  # ===== RD. Rhetorical device rules =====

  - id: "RD.1"
    category: "RD"
    number: 1
    order: 10
    title: "Use explicit signposting of argument element roles"
    guideline: |-
      Make it clear whether a statement is functioning as a claim, evidence reference, context, assumption, or justification.
    why: |-
      Review becomes harder when the reader must infer the role of a statement. Clear signposting reduces confusion between argument elements and makes the structure easier to inspect.
    review_prompts:
      - "Is the reader forced to infer the role of the statement?"
      - "Are claims, context, assumptions, and justifications mixed together?"
      - "Is evidence clearly identifiable as evidence rather than explanation or claim text?"
    example:
      markdown: |-
        - Bad pattern:
          - The braking controller is safe in automated mode with valid localization because tests passed.
        - Problem: the sentence mixes claim, context, assumption, and evidential reasoning in one statement.
        - Better notation-neutral pattern:
          - Claim: Braking controller safety is acceptable.
          - Context: Applies in automated mode.
          - Assumption: Valid localization is available.
          - Evidence: Brake controller verification report BVR-09.
          - Justification (if needed): The cited verification evidence is relevant to the defined operating conditions.
      cases:
        - role: "bad"
          label: "Bad pattern"
          text: "The braking controller is safe in automated mode with valid localization because tests passed."
        - role: "problem"
          label: "Problem"
          text: "The sentence mixes claim, context, assumption, and evidential reasoning in one statement."
        - role: "better"
          label: "Better pattern"
          elements:
            claim: ["Braking controller safety is acceptable."]
            context: ["Applies in automated mode."]
            assumption: ["Valid localization is available."]
            evidence: ["Brake controller verification report BVR-09."]
            justification: ["The cited verification evidence is relevant to the defined operating conditions."]
    references:
      - source_id: "UL4600"
        clauses: ["5.3.3.1(b)", "5.3.3.2(b)"]
      - source_id: "GSN-v3"
        clauses: ["1:2.2.10-1:2.2.19", "1:2.3.2-1:2.3.6"]
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Context", "GSN Assumption", "GSN Solution", "GSN Justification"]
      detection_hints:
        - "Look for prose statements that mix claim, context, assumption, and evidence in one sentence."
      suggested_checks:
        - id: "check-element-signposting"
          description: "Check whether each statement is clearly signposted with its argument element role."
      suggested_ai_prompt: |-
        Decompose this prose into explicitly signposted argument elements (claim, context, assumption, evidence, justification).
    tags: ["rhetoric", "signposting"]

  - id: "RD.2"
    category: "RD"
    number: 2
    order: 20
    title: "Use scoped claims and qualified confidence language"
    guideline: |-
      State the operating scope and use confidence language that reflects the actual support and any open issues.
    why: |-
      Safety cases should communicate justified confidence, not absolute assurance when support is partial, bounded, or still open in some respects.
    review_prompts:
      - "Is the scope of the claim explicit?"
      - "Is unresolved uncertainty visible?"
      - "Does the wording overstate closure?"
      - "Does the confidence language match the actual support?"
    example:
      markdown: |-
        - Bad: The item is safe.
        - Better: The item is acceptably safe for daytime urban operation in ODD-A under assumptions A1-A4, with open issue OI-03 for night rain behavior.
      cases:
        - role: "bad"
          label: "Bad"
          text: "The item is safe."
        - role: "better"
          label: "Better"
          text: "The item is acceptably safe for daytime urban operation in ODD-A under assumptions A1-A4, with open issue OI-03 for night rain behavior."
    references:
      - source_id: "UL4600"
        clauses: ["5.3.3.1(b)", "5.3.3.2(b)", "5.2.3.3(d)"]
    tool_guidance:
      applicable_elements: ["GSN Goal"]
      detection_hints:
        - "Look for unscoped claims using absolute confidence language (is safe, is correct)."
      suggested_checks:
        - id: "check-scope-and-confidence-language"
          description: "Check whether claims state operating scope and use confidence language matched to actual support."
      suggested_ai_prompt: |-
        Reword this claim to state operating scope explicitly and use confidence language matched to the actual support and open issues.
    tags: ["rhetoric", "confidence", "scope"]

  - id: "RD.3"
    category: "RD"
    number: 3
    order: 30
    title: "Make limitations, objections, and responses explicit"
    guideline: |-
      Make relevant limitations, plausible objections, and uncertainty sources explicit, together with how they are addressed in the argument.
    why: |-
      A safety case is easier to review and trust when it shows not only supporting material, but also the important limits and challenges that affect confidence in the claim.
    review_prompts:
      - "Are important limitations visible at the point where they affect the claim?"
      - "Are plausible objections or challenges addressed explicitly?"
      - "Is unresolved doubt hidden, or made visible through scope restriction, assumptions, monitoring, or open issues?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Perception robustness is acceptable.
          - Evidence: Simulation report SIM-04.
          - Evidence: Road test report RTR-07.
        - Problem: the branch presents supporting evidence, but does not make visible that occlusion behavior is only partly covered and remains a relevant challenge to the claim.
        - Better notation-neutral pattern:
          - Claim: Perception robustness is acceptable for the defined visible-object conditions.
          - Context: Claim excludes object occlusion cases beyond the tested coverage defined in OCS-02.
          - Evidence: Simulation report SIM-04.
          - Evidence: Road test report RTR-07.
          - Open Issue: Robustness under severe occlusion remains unresolved and requires additional evidence.
        - Or, if the objection is addressed rather than excluded:
          - Claim: Perception robustness is acceptable for the defined visible-object conditions.
          - Evidence: Simulation report SIM-04.
          - Evidence: Road test report RTR-07.
          - Evidence: Occlusion test report OTR-03.
          - Justification: The relevant occlusion challenge is explicitly addressed by the added evidence.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better (scoped exclusion or added evidence)"
          text: "See markdown for the full bad pattern, problem, and two better-pattern variants."
    references:
      - source_id: "CAE-Review"
      - source_id: "CAE-Defeaters"
      - source_id: "RA1205"
      - source_id: "ONR"
      - source_id: "EASA"
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Context", "GSN Open Issue"]
      detection_hints:
        - "Look for claims with no visible limitation, exclusion, or open issue despite known partial coverage."
      suggested_checks:
        - id: "check-limitations-visible"
          description: "Check whether known limitations and objections are visible at the point of the affected claim."
      suggested_ai_prompt: |-
        Identify the limitations and objections relevant to this claim. Propose how each should be made visible (scope, evidence, or open issue).
    tags: ["rhetoric", "limitations"]

  - id: "RD.4"
    category: "RD"
    number: 4
    order: 40
    title: "Avoid promotional and inflated language"
    guideline: |-
      Do not use promotional, boastful, or image-enhancing language in the safety case.
    why: |-
      Safety arguments should build confidence through explicit claims, reasoning, and evidence, not through language intended to impress the reader.
    review_prompts:
      - "Does the wording sound promotional rather than argumentative?"
      - "Would the sentence lose nothing important if the praise-like wording were removed?"
      - "Is the wording trying to create confidence through tone rather than support?"
    example:
      markdown: |-
        - Bad claim: A world-class, cutting-edge safety architecture delivers outstanding assurance.
        - Better claim: The architecture prevents hazardous actuation for fault classes F1-F4 under assumptions A1-A3.
      cases:
        - role: "bad"
          label: "Bad claim"
          text: "A world-class, cutting-edge safety architecture delivers outstanding assurance."
        - role: "better"
          label: "Better claim"
          text: "The architecture prevents hazardous actuation for fault classes F1-F4 under assumptions A1-A3."
    references:
      - source_id: "CAE"
      - source_id: "OMG-SACM"
      - source_id: "EASA"
      - source_id: "RA1205"
    tool_guidance:
      applicable_elements: ["GSN Goal"]
      detection_hints:
        - "Look for promotional adjectives such as world-class, cutting-edge, outstanding, best-in-class."
      suggested_checks:
        - id: "check-promotional-language"
          description: "Check whether claims use promotional or image-enhancing language."
      suggested_ai_prompt: |-
        Identify promotional or inflated language in this claim. Propose a neutral, argumentative rewording.
    tags: ["rhetoric", "language"]

  - id: "RD.5"
    category: "RD"
    number: 5
    order: 50
    title: "Avoid passive voice when it hides agency"
    guideline: |-
      Do not use passive wording when the identity of the actor matters to understanding, reviewing, or challenging the argument.
    why: |-
      When a review, judgment, approval, or decision is stated without naming who performed it, accountability becomes harder to inspect and challenge.
    review_prompts:
      - "Who performed the review, judgment, or approval?"
      - "Does the wording hide who is responsible?"
      - "Would naming the actor improve traceability or auditability?"
    example:
      markdown: |-
        - Bad: It was determined that the claim is adequately supported.
        - Better: Safety review board SRB-02 reviewed evidence E12-E19 and concluded that the claim is adequately supported.
      cases:
        - role: "bad"
          label: "Bad"
          text: "It was determined that the claim is adequately supported."
        - role: "better"
          label: "Better"
          text: "Safety review board SRB-02 reviewed evidence E12-E19 and concluded that the claim is adequately supported."
    references:
      - source_id: "RA1205"
      - source_id: "HSE"
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Justification"]
      detection_hints:
        - "Look for it was determined / has been reviewed / is considered without a named actor."
      suggested_checks:
        - id: "check-active-voice-with-actor"
          description: "Check whether reviews, judgments, and approvals name the responsible actor."
      suggested_ai_prompt: |-
        Identify passive wording that hides agency in this statement. Propose an active rewording naming the responsible actor.
    tags: ["rhetoric", "agency"]

  - id: "RD.6"
    category: "RD"
    number: 6
    order: 60
    title: "Do not bury important limitations or hidden assumptions"
    guideline: |-
      Do not hide important limitations or assumptions in appendices, footnotes, or free text that is not directly connected to the claim they qualify.
    why: |-
      A safety case should make important boundaries visible where the claim is read. If key limitations or assumptions are easy to miss, the claim can appear stronger or broader than the argument really supports.
    review_prompts:
      - "Is an important limitation easy to miss?"
      - "Is an important assumption stated explicitly as an assumption, or only implied elsewhere?"
      - "Would a reviewer be misled by reading only the main branch?"
      - "Should the limitation or dependency be made visible through context, an assumption, or a narrower claim?"
    example:
      markdown: |-
        - Bad pattern:
          - Claim: Perception robustness is acceptable.
          - Evidence: Perception validation report PVR-08.
          - A later appendix states that the reported results exclude heavy rain, dense fog, and severe occlusion.
        - Problem: the main claim appears broad, but important limiting conditions are only visible outside the main branch.
        - Better notation-neutral pattern:
          - Claim: Perception robustness is acceptable for the validated visibility conditions.
          - Context: Claim excludes heavy rain, dense fog, and severe occlusion beyond the tested range defined in PVR-08.
          - Evidence: Perception validation report PVR-08.
        - Or, where the dependency is really an assumption:
          - Claim: Perception robustness is acceptable.
          - Assumption: Visibility conditions remain within the validated range defined in PVR-08.
          - Evidence: Perception validation report PVR-08.
      cases:
        - role: "informative"
          label: "Bad / Problem / Better (scoped or assumption variant)"
          text: "See markdown for the full bad pattern, problem, and two better-pattern variants."
    references:
      - source_id: "CAE-Defeaters"
      - source_id: "RA1205"
      - source_id: "UNECE-ADS"
    tool_guidance:
      applicable_elements: ["GSN Goal", "GSN Context", "GSN Assumption"]
      detection_hints:
        - "Look for important limiting conditions stated only in appendices or distant free text."
      suggested_checks:
        - id: "check-limitations-collocated"
          description: "Check whether important limitations and assumptions are visible where the claim is read."
      suggested_ai_prompt: |-
        Identify limiting conditions or hidden assumptions that should be co-located with this claim. Propose context, assumption, or narrower claim wording.
    tags: ["rhetoric", "limitations", "assumption"]























