schema_version: "0.3.0"

document:
  title: "Safety Case Core Guidelines"
  copyright: "© 2026 Jesper Brännström"
  license:
    id: "CC-BY-4.0"
    name: "Creative Commons Attribution 4.0 International License"
    url: "https://creativecommons.org/licenses/by/4.0/"

  purpose: |-
    This document consolidates review guidance for safety cases into one
    guideline-based review framework that can be cited during reviews.

  source_policy:
    summary: |-
      These guidelines draw on several source classes. The wording in this
      document is intended to paraphrase source material and established
      practice rather than reproduce source text.

  method_application_guidance:
    summary: |-
      SCCG guidelines should be interpreted as notation-neutral quality expectations where possible. When a development process uses a specific assurance-case notation or method, apply the guideline through the corresponding notation elements and use guideline notes for method-specific interpretation.
    recommendations:
      - method: "GSN-based development"
        recommendation: |-
          Apply the full SCCG set. Interpret claims as GSN goals, inference or decomposition steps as strategies, context as GSN context, assumptions as GSN assumptions, and evidence as GSN solutions. Use note fields for GSN-specific interpretation where provided.
      - method: "CAE-based development"
        recommendation: |-
          Apply the full SCCG set, but interpret GSN-oriented terms through CAE concepts. Interpret claims as CAE claims, inference or decomposition steps as CAE arguments or warrants, evidence as CAE evidence or supporting information, and use note fields for CAE-specific interpretation where provided.
      - method: "SACM or tool-neutral interchange"
        recommendation: |-
          Apply the notation-neutral guideline text first. Use tool guidance and notes only as mapping guidance into the tool's specific element model.

  id_scheme:
    - prefix: "CL"
      meaning: "Claim guidance"
    - prefix: "AR"
      meaning: "Argument structure and decomposition guidance"
    - prefix: "EV"
      meaning: "Evidence guidance"
    - prefix: "SU"
      meaning: "Sufficiency, uncertainty, and pitfall guidance"
    - prefix: "LF"
      meaning: "Logical fallacy guidance"
    - prefix: "RD"
      meaning: "Rhetorical device guidance"

  required_guideline_sections:
    - "Guideline"
    - "Why"
    - "Review prompts"
    - "Example"
    - "References"

  review_comment_examples:
    - guideline_id: "CL.4"
      text: "Claim is structurally ambiguous. Reword so the object and property are clear."
    - guideline_id: "AR.2"
      text: "The inference step is hidden in the claim text. Make the reasoning element explicit, for example as a GSN strategy or CAE argument/warrant."
    - guideline_id: "EV.4"
      text: "Evidence reference is too broad. Point to the exact section, figure, table, or dataset actually used."
    - guideline_id: "SU.6"
      text: "Operational feedback includes potentially contrary evidence, but the argument dismisses it without a defensible basis."
    - guideline_id: "LF.3"
      text: "This branch argues from ignorance; absence of discovered evidence is being treated as evidence of absence."
    - guideline_id: "RD.4"
      text: "The wording uses promotional language that makes the claim sound stronger than it is."

