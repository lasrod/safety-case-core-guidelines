name: Validate and check index.md sync

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate guidelines.yaml
        run: python scripts/validate_guidelines.py

      - name: Regenerate index.md
        run: python scripts/generate_index.py

      - name: Fail if index.md is out of sync with data/guidelines.yaml
        run: |
          if ! git diff --exit-code -- index.md; then
            echo ""
            echo "::error::index.md is out of sync with data/guidelines.yaml."
            echo "Run: python scripts/generate_index.py and commit the result."
            exit 1
          fi
